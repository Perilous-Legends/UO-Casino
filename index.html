<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heroes of Holdem - Casino</title>
  <link rel="stylesheet" href="style.css">
  <style>
    #crash-overlay{ display:none; position:fixed; top:0; left:0; width:100%; background:rgba(200,0,0,0.92);
      color:#fff; font-family:monospace; font-size:13px; padding:12px; z-index:99999;
      white-space:pre-wrap; word-break:break-all; max-height:40vh; overflow-y:auto; }
  </style>
</head>
<body>
  <div id="crash-overlay"></div>
  <script>
    window.onerror = function(msg, src, line, col, err) {
      const el = document.getElementById('crash-overlay');
      el.style.display = 'block';
      el.textContent = 'ERROR: ' + msg + '\nFile: ' + src + ' Line: ' + line + '\n' + (err ? err.stack : '');
    };
    window.addEventListener('unhandledrejection', function(e) {
      const el = document.getElementById('crash-overlay');
      el.style.display = 'block';
      el.textContent = 'PROMISE ERROR: ' + e.reason;
    });
  </script>
  <div id="game-container">
    <div id="game-modal">
      <iframe id="game-iframe" allow="autoplay"></iframe>
      <button id="modal-close">Close (ESC)</button>
    </div>
    <div id="coming-soon">
      <h2>Coming Soon</h2>
      <p id="coming-soon-text">This game is under construction.</p>
      <button id="coming-soon-close">Close (ESC)</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <script src="casino.js?v=20260321e"></script>
</body>
</html>
