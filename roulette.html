<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Roulette - PL Casino</title>
<style>
*{ box-sizing:border-box; margin:0; padding:0; }
html,body{ width:100%; height:100%; overflow:hidden; font-family:Georgia,serif; color:#fff; }

:root{
  --wheel-size: 70.5vh;
  --wheel-left: 55.5%;
  --wheel-top: 28.5%;
  --table-scale: 0.75;
  --table-x: -58px;
  --table-y: 342px;
  --chip-size: 10.9vh;
  --bar-x: 123px;
  --bar-y: 171px;
  --bar-width: 110%;
  --bar-ml: -5%;
  --chip-gap: 0.35vw;
  --bar-font: 2.05vw;
  --btn-font: 1.75vw;
  --btn-pad-v: 2.4vh;
  --chips-x: -9px;
  --bet-x: 16px;
  --spin-x: -27px;
  --rebet-x: -27px;
  --clear-x: -27px;
  --bal-x: -82px;
  --btn-pad-h: 2.05vw;
  --bal-gap: 0.8vw;
  --bal-ml: 0px;
  --btn-ml: 0px;
}

body{
  display:flex; align-items:center; justify-content:center;
  background: #000 url('https://drive.google.com/thumbnail?id=1YqLzKVIWx2neB4K4l7U0JK1l-KRS0Lyu&sz=w1600') center center / auto 100% no-repeat;
  zoom: 0.75;
}

.game{
  width:100vw; height:100vh; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding: 1vh 2vw 1vh;
  position:relative;
  overflow: visible;
}

/* WHEEL */
#wheelArea{
  position: fixed;
  left: var(--wheel-left);
  top: var(--wheel-top);
  transform: translate(-50%, -50%);
  z-index: 10;
  pointer-events: none;
}
#wheelCanvas{
  display:block;
  filter: drop-shadow(0 8px 32px rgba(0,0,0,0.9));
}

/* TABLE */
#tableWrap{
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  transform: translate(var(--table-x), var(--table-y)) scale(var(--table-scale));
  transform-origin: center center;
  width: fit-content;
  margin: 0 auto;
}
#felt{
  display:none !important;
}

/* NUMBER GRID */
#numArea{ display:flex; gap:4px; align-items:stretch; }
#zeroCol{ display:flex; align-items:center; justify-content:center; }
.zero-cell{
  width:3.2vw; display:flex; align-items:center; justify-content:center;
  background:#1a6e2e; border:2px solid rgba(255,255,255,0.3); border-radius:6px;
  font-size:1.4vw; font-weight:bold; cursor:pointer; user-select:none;
  transition:all 0.15s; position:relative;
}
.zero-cell:hover{ border-color:#ffd700; box-shadow:0 0 10px rgba(255,215,0,0.5); }
#gridCols{ display:flex; gap:3px; flex:1; }
.grid-col{ display:flex; flex-direction:column; gap:3px; }
.num-cell{
  width:4.2vw; height:4.2vh; border-radius:50%; display:flex; align-items:center; justify-content:center;
  font-size:1.1vw; font-weight:bold; cursor:pointer; user-select:none;
  border:2px solid rgba(255,255,255,0.2); transition:all 0.12s; position:relative;
  text-shadow:0 1px 2px rgba(0,0,0,0.8);
}
.num-cell.red{ background:radial-gradient(circle at 35% 30%, #e84040, #9a1010); }
.num-cell.black{ background:radial-gradient(circle at 35% 30%, #444, #111); }
.num-cell:hover{ border-color:#ffd700; transform:scale(1.12); box-shadow:0 0 10px rgba(255,215,0,0.5); z-index:5; }
.num-cell.has-bet::after, .zero-cell.has-bet::after, .out-cell.has-bet::after, .doz-cell.has-bet::after{
  content:attr(data-chips); position:absolute; top:-4px; right:-2px;
  font-size:0.7vw; color:#ffd700; font-weight:bold; background:rgba(0,0,0,0.7);
  border-radius:3px; padding:0 2px; pointer-events:none;
}

/* DOZENS */
#dozenRow{ display:flex; gap:4px; padding-left: calc(3.2vw + 8px); }
.doz-cell{
  flex:1; padding:0.6vh 0; text-align:center; font-size:1vw; font-weight:bold;
  background:rgba(0,0,0,0.2); border:1px solid rgba(255,255,255,0.2); border-radius:4px;
  cursor:pointer; user-select:none; transition:all 0.12s; position:relative;
}
.doz-cell:hover{ border-color:#ffd700; background:rgba(255,215,0,0.1); }

/* OUTSIDE BETS */
#outsideRow{ display:flex; gap:4px; padding-left: calc(3.2vw + 8px); }
.out-cell{
  flex:1; padding:0.7vh 0; text-align:center; font-size:1vw; font-weight:bold;
  border:1px solid rgba(255,255,255,0.2); border-radius:4px; cursor:pointer;
  user-select:none; transition:all 0.12s; position:relative;
  display:flex; align-items:center; justify-content:center;
}
.out-cell:hover{ border-color:#ffd700; box-shadow:0 0 8px rgba(255,215,0,0.3); }
.out-cell.red-bg{ background:radial-gradient(circle at 40% 40%, #cc2200, #7a0e00); }
.out-cell.blk-bg{ background:radial-gradient(circle at 40% 40%, #333, #111); }
.out-cell.neutral{ background:rgba(0,0,0,0.2); color:#ddd; }
.diamond{ width:1.4vw; height:1.4vw; transform:rotate(45deg); display:inline-block; }
.diamond.red{ background:#cc0000; }
.diamond.blk{ background:#111; border:1px solid #444; }

/* BOTTOM BAR */
#bottomBar{
  width:var(--bar-width); margin-left:var(--bar-ml); display:flex; align-items:center;
  justify-content:space-between;
  background:rgba(0,0,0,0.6); border-radius:8px; padding:0.8vh 1.8vw;
  border:1px solid rgba(255,255,255,0.1);
  transform: translate(var(--bar-x), var(--bar-y));
  margin-top:6px; flex-shrink:0;
  overflow:visible;
}
#chipRow{ display:flex; gap:4px; align-items:center; }
.chip-slot{
  width:10.9vh; height:10.9vh;
  flex-shrink:0; display:flex; align-items:center; justify-content:center;
}
.chip{
  width:100%; height:100%; border-radius:50%; cursor:pointer;
  border:3px solid transparent; transition:all 0.15s; user-select:none;
  overflow:hidden; flex-shrink:0;
}
.chip img{ width:100%; height:100%; display:block; border-radius:50%; pointer-events:none; }
.chip:hover{ transform:scale(1.1); }
.chip.selected{ border-color:#fff; box-shadow:0 0 14px rgba(255,215,0,0.8); transform:scale(1.15); }

#balSection{ font-size:var(--bar-font); color:#ccc; white-space:nowrap; transform:translateX(var(--bal-x)); flex-shrink:0; width:16ch; }
#balSection b{ color:#ffd700; font-variant-numeric:tabular-nums; display:inline-block; min-width:9ch; text-align:right; }
#betSection{ font-size:var(--bar-font); color:#ccc; white-space:nowrap; transform:translateX(var(--bet-x)); flex-shrink:0; width:13ch; }
#betSection b{ color:#ffd700; font-variant-numeric:tabular-nums; display:inline-block; min-width:7ch; text-align:right; }
#chipRow{ transform:translateX(var(--chips-x)); flex-shrink:0; }

#actionBtns{ display:flex; gap:0.8vw; align-items:center; flex-shrink:0; }
.aBtn{
  padding:var(--btn-pad-v) var(--btn-pad-h); border-radius:6px; cursor:pointer; font-family:Georgia,serif;
  font-size:var(--btn-font); font-weight:bold; border:2px solid; transition:all 0.15s; letter-spacing:1px;
}
#spinBtn{ background:rgba(20,80,20,0.9); border-color:#4aff7a; color:#4aff7a; transform:translateX(var(--spin-x)); }
#spinBtn:hover:not(:disabled){ box-shadow:0 0 12px rgba(74,255,122,0.4); }
#spinBtn:disabled{ opacity:0.4; cursor:not-allowed; }
#clearBtn{ background:rgba(60,20,20,0.8); border-color:#ff6060; color:#ff6060; transform:translateX(var(--clear-x)); }
#rebetBtn{ background:rgba(36,26,8,0.9); border-color:#8a5a10; color:#e8a030; visibility:hidden; transform:translateX(var(--rebet-x)); }
.aBtn:hover{ filter:brightness(1.15); }

/* PROBE PANEL */
#probePanel{
  position:fixed; top:10px; right:10px; z-index:9999;
  background:rgba(0,0,0,0.93); border:1px solid #ffd700; border-radius:8px;
  padding:12px 16px; width:270px; max-height:90vh; overflow-y:auto;
  font-family:monospace; font-size:12px; color:#fff;
}
#probePanel .ph{ color:#ffd700; font-size:13px; letter-spacing:2px; margin-bottom:8px; display:block; }
.probe-row{ display:flex; align-items:center; justify-content:space-between; gap:6px; margin-bottom:4px; }
.probe-lbl{ font-weight:bold; min-width:52px; }
.probe-val{ color:#ffd700; font-size:10px; }
.pcopy{ width:100%; margin-top:8px; padding:5px; font-family:monospace; font-size:11px;
  cursor:pointer; border-radius:3px; background:#2a1a00; border:1px solid #ffd700; color:#ffd700; }
.pcopy:hover{ filter:brightness(1.2); }
.phint{ font-size:10px; color:#555; margin-top:6px; }

/* RESULT */
:root{
  --result-size: 288px;
  --result-x: 55.5%;
  --result-y: 28%;
}
#resultBanner{
  position:fixed;
  left: var(--result-x); top: var(--result-y);
  transform: translate(-50%,-50%);
  width: var(--result-size); height: var(--result-size);
  border-radius: 50%;
  background:rgba(0,0,0,0.95); border:3px solid #ffd700;
  display:none; z-index:100;
  box-shadow:0 0 50px rgba(255,215,0,0.5);
  flex-direction:column; align-items:center; justify-content:center; text-align:center;
}
.rtitle{ font-size:3.2vh; font-weight:bold; margin-bottom:0.6vh; }
.rnum{ font-size:6.5vh; font-weight:bold; margin:0.3vh 0; }
.rpay{ font-size:1.8vh; font-weight:bold; margin-top:0.4vh; }
#resultBanner{ cursor:pointer; }
#resultBanner:hover{ box-shadow:0 0 60px rgba(255,215,0,0.7); }




/* CANDLES */
#candleLayer{
  position:fixed; top:0; left:0; width:100vw; height:100vh;
  pointer-events:none; z-index:480;
  zoom:1.3333;
}
.candle-wrap{
  position:absolute; transform:translate(-50%,-100%);
  display:flex; flex-direction:column; align-items:center;
  pointer-events:none;
}
.candle-glow{
  position:absolute; bottom:0; left:50%;
  transform:translateX(-50%);
  border-radius:50%;
  background:radial-gradient(circle, rgba(255,200,80,0.18) 0%, transparent 70%);
  pointer-events:none;
}
.candle-flame-wrap{
  position:relative; display:flex; flex-direction:column; align-items:center;
}
.candle-flame{
  width:7px; height:13px;
  background:radial-gradient(ellipse at 50% 80%, #fff700 0%, #ff9900 45%, #ff4400 80%, transparent 100%);
  border-radius:50% 50% 30% 30% / 60% 60% 40% 40%;
  transform-origin:50% 100%;
  animation:flicker 0.35s ease-in-out infinite alternate;
  filter:blur(0.4px);
}
.candle-flame-inner{
  position:absolute; bottom:2px; left:50%; transform:translateX(-50%);
  width:3px; height:7px;
  background:radial-gradient(ellipse at 50% 80%, #ffffff 0%, #ffff88 60%, transparent 100%);
  border-radius:50% 50% 30% 30% / 60% 60% 40% 40%;
  animation:flicker2 0.28s ease-in-out infinite alternate;
}
.candle-wick{
  width:1.5px; height:4px;
  background:#333;
}
.candle-body{
  width:10px;
  background:linear-gradient(to right, #f5e8b0 0%, #fffde0 30%, #e8d470 70%, #c9b840 100%);
  border-radius:1px 1px 2px 2px;
  border:1px solid rgba(0,0,0,0.15);
  position:relative;
}
.candle-body::after{
  content:''; position:absolute; top:0; left:1px; right:1px; height:3px;
  background:rgba(255,255,255,0.3); border-radius:1px;
}
.candle-drip{
  position:absolute; top:0; left:2px;
  width:3px; height:6px;
  background:#f5e8b0;
  border-radius:0 0 3px 3px;
}
@keyframes flicker{
  0%  { transform:scaleX(1)   scaleY(1)    rotate(-2deg); opacity:1;   }
  30% { transform:scaleX(0.88) scaleY(1.08) rotate(2deg);  opacity:0.92; }
  60% { transform:scaleX(1.08) scaleY(0.94) rotate(-1deg); opacity:1;   }
  100%{ transform:scaleX(0.93) scaleY(1.06) rotate(3deg);  opacity:0.95; }
}
@keyframes flicker2{
  0%  { transform:translateX(-50%) scaleX(1)    scaleY(1);    opacity:0.9; }
  50% { transform:translateX(-50%) scaleX(1.2)  scaleY(0.9);  opacity:1;   }
  100%{ transform:translateX(-50%) scaleX(0.85) scaleY(1.1);  opacity:0.85;}
}





/* PARTICLE FLAME */
#flameCanvas{ position:fixed; pointer-events:none; z-index:481; }
#torchDebug{
  position:fixed; bottom:70px; right:10px; z-index:9999;
  background:rgba(0,0,0,0.93); border:1px solid #ff9900; border-radius:8px;
  padding:12px 18px; width:300px; font-family:monospace; font-size:12px; color:#fff;
}
#torchDebug .ph{ color:#ff9900; font-size:12px; letter-spacing:2px; margin-bottom:8px; display:block; }
.td-row{ display:flex; align-items:center; gap:8px; margin-bottom:5px; }
.td-lbl{ color:#aaa; min-width:36px; font-size:11px; font-weight:bold; }
.td-row input[type=range]{ flex:1; accent-color:#ff9900; height:18px; cursor:pointer; }
.td-val{ color:#ff9900; min-width:46px; font-size:11px; text-align:right; }
.tdcopy{ width:100%; margin-top:8px; padding:5px; font-family:monospace; font-size:11px;
  cursor:pointer; border-radius:3px; background:#1a0a00; border:1px solid #ff9900; color:#ff9900; }
.tdcopy:hover{ filter:brightness(1.2); }

/* MUSIC TOGGLE */
#musicBtn{
  position:fixed; bottom:18px; right:18px; z-index:9999;
  width:44px; height:44px; border-radius:50%;
  background:rgba(0,0,0,0.7); border:2px solid rgba(255,215,0,0.5);
  color:#ffd700; font-size:20px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all 0.2s; user-select:none;
}
#musicBtn:hover{ border-color:#ffd700; box-shadow:0 0 12px rgba(255,215,0,0.4); }

/* PROBE LAYER - counter-zoom so circles aren't affected by body zoom */
#probeLayer{
  position:fixed; top:0; left:0; width:100vw; height:100vh;
  pointer-events:none; z-index:500;
  zoom: 1.3333;
}
.probe-circle{
  position:absolute; border-radius:50%; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  font-family:Georgia,serif; font-weight:bold; user-select:none;
  transform:translate(-50%,-50%);
  pointer-events:all;
  flex-shrink:0; box-sizing:content-box;
}
.probe-bet{
  position:absolute; top:-8px; right:-4px;
  font-size:10px; color:#ffd700; font-weight:bold;
  background:rgba(0,0,0,0.85); border-radius:3px;
  padding:0 3px; pointer-events:none; display:none;
}

</style>
</head>
<body>
<div id="pl-banner" style="position:fixed;top:0;left:0;right:0;z-index:9998;background:#a30000;color:#fff;text-align:center;padding:9px;font-family:sans-serif;font-size:14px;display:none;"></div>
<script src="pl-bridge.js?v=20260507a"></script>
<div class="game">

  <!-- TABLE -->
  <div id="tableWrap">
    <div id="felt">
      <div id="numArea">
        <div id="zeroCol">
          <div class="zero-cell" data-key="0" onclick="placeBet('0')" id="cell-0">0<br>00</div>
        </div>
        <div id="gridCols"></div>
      </div>
      <div id="dozenRow">
        <div class="doz-cell" data-key="1st12" onclick="placeBet('1st12')">1st 12</div>
        <div class="doz-cell" data-key="2nd12" onclick="placeBet('2nd12')">2nd 12</div>
        <div class="doz-cell" data-key="3rd12" onclick="placeBet('3rd12')">3rd 12</div>
      </div>
      <div id="outsideRow">
        <div class="out-cell neutral" data-key="1-18"  onclick="placeBet('1-18')">1 to 18</div>
        <div class="out-cell neutral" data-key="even"  onclick="placeBet('even')">EVEN</div>
        <div class="out-cell red-bg" data-key="red"   onclick="placeBet('red')"><span class="diamond red"></span></div>
        <div class="out-cell blk-bg" data-key="black" onclick="placeBet('black')"><span class="diamond blk"></span></div>
        <div class="out-cell neutral" data-key="odd"   onclick="placeBet('odd')">ODD</div>
        <div class="out-cell neutral" data-key="19-36" onclick="placeBet('19-36')">19 to 36</div>
      </div>
    </div>
    <div id="bottomBar">
      <div id="chipRow"></div>
      <div id="betSection">Bet: <b id="betDisp">0g</b></div>
      <div id="actionBtns">
        <button class="aBtn" id="spinBtn"  onclick="spin()">SPIN</button>
        <button class="aBtn" id="rebetBtn" onclick="rebet()">REBET</button>
        <button class="aBtn" id="clearBtn" onclick="clearBets()">CLEAR</button>
      </div>
      <div id="balSection">Bank: <b id="balDisp">…g</b></div>
    </div>
  </div>

  <div id="resultBanner" onclick="newRound()">
    <div class="rtitle" id="rTitle">-</div>
    <div class="rnum"   id="rNum">-</div>
    <div class="rpay"   id="rPay"></div>
  </div>
</div>

<!-- WHEEL lives outside .game so nothing clips it -->
<div id="wheelArea">
  <canvas id="wheelCanvas"></canvas>
</div>

<audio id="bgMusic" loop src="./bg-music.mp3"></audio>

<button id="musicBtn" onclick="toggleMusic()" title="Toggle music">🔊</button>

<div id="probeLayer"></div>


<div id="candleLayer"></div>
<canvas id="flameCanvas"></canvas>

<div id="probePanel" style="display:none">
  <span class="ph">BET ZONES</span>
  <div id="probeRows"></div>
  <button class="pcopy" onclick="copyProbes()">📋 COPY ALL</button>
  <div class="phint">Drag to move &bull; Scroll to resize</div>
</div>

<script>
// ---- CONSTANTS ----
const WHEEL_ORDER = [0,28,9,26,30,11,7,20,32,17,5,22,34,15,3,24,36,13,1,'00',27,10,25,29,12,8,19,31,18,6,21,33,16,4,23,35,14,2];
const SLOTS = WHEEL_ORDER.length;
const RED_NUMS = new Set([1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36]);

function colorOf(n){
  if(n===0||n==='00'||n==='0') return 'green';
  return RED_NUMS.has(Number(n)) ? 'red' : 'black';
}

// ---- GRID ----
const COLS = 12;
function buildGrid(){
  const gc = document.getElementById('gridCols'); gc.innerHTML='';
  for(let col=0;col<COLS;col++){
    const div=document.createElement('div'); div.className='grid-col';
    for(let row=0;row<3;row++){
      const n=col*3+(3-row);
      const c=document.createElement('div');
      c.className=`num-cell ${colorOf(n)}`; c.textContent=n;
      c.dataset.key=String(n); c.id=`cell-${n}`;
      c.onclick=()=>placeBet(String(n)); div.appendChild(c);
    }
    gc.appendChild(div);
  }
}

// ---- CHIPS ----
const CHIP_DEFS = [
  {val:100,   label:'100', img:'https://drive.google.com/thumbnail?id=1hx7VaQG7UFHtdOE_uGJ64cOuedd81n-x&sz=w200'},
  {val:500,   label:'500', img:'https://drive.google.com/thumbnail?id=1IJ7Lp03TQ7rJjetXNoUGq9TB5b8sJmTs&sz=w200'},
  {val:1000,  label:'1K',  img:'https://drive.google.com/thumbnail?id=1gN38szt9JExdAZrVipnRKahg9zLwGtOq&sz=w200'},
  {val:5000,  label:'5K',  img:'https://drive.google.com/thumbnail?id=11cxGHjfNZFIJgTXnQGmFDSFK-1fUhVup&sz=w200'},
  {val:10000, label:'10K', img:'https://drive.google.com/thumbnail?id=10SkRQCPz-BckF4jBUS0noiSmThGsyx47&sz=w200'},
];
let selectedChip=100;
function buildChips(){
  const row=document.getElementById('chipRow'); row.innerHTML='';
  CHIP_DEFS.forEach(ch=>{
    const slot=document.createElement('div');
    slot.className='chip-slot';
    const d=document.createElement('div');
    d.className=`chip${ch.val===selectedChip?' selected':''}`;
    d.title=ch.label;
    d.innerHTML=`<img src="${ch.img}" alt="${ch.label}">`;
    d.onclick=()=>selectChip(ch.val);
    slot.appendChild(d);
    row.appendChild(slot);
  });
}
function selectChip(v){ playClick(); selectedChip=v; buildChips(); }

// ---- STATE ----
// `balance` mirrors PL's server-authoritative balance. We don't decrement
// it on chip-clicks — bets accumulate locally, and the actual wager
// happens on Spin (single PL.wager call for the round total).
// The displayed remaining bank shows balance - totalBet() pre-spin.
let balance=0, bets={}, lastBets={}, spinning=false, winNumber=null;
// True while bets are local (not yet wagered against the server). Flips
// to false during spin/settle so the displayed remaining bank doesn't
// double-deduct.
let betsArePending=true;
function totalBet(){ return Object.values(bets).reduce((a,b)=>a+b,0); }

// PL bridge bootstrap
(async function(){
  const banner = document.getElementById('pl-banner');
  function showBanner(msg){ banner.textContent = msg; banner.style.display = 'block'; }
  try {
    const info = await PL.init();
    balance = info.balance;
    PL.onBalanceChanged((b)=>{ balance = b; updateUI(); });
    updateUI();
  } catch (e) {
    showBanner('Casino offline: ' + (e && e.message || e) + ' — close this tab and buy in from a Casino Stone.');
  }
})();

function placeBet(key){
  if(spinning||(balance-totalBet())<selectedChip) return;
  playClick();
  bets[key]=(bets[key]||0)+selectedChip; updateUI();
}
function clearBets(){
  if(spinning) return;
  playClick();
  bets={}; updateUI();
}
function rebet(){
  if(!Object.keys(lastBets).length) return;
  playClick();
  clearBets();
  const tot=Object.values(lastBets).reduce((a,b)=>a+b,0);
  if(balance<tot) return;
  bets={...lastBets}; updateUI();
}

function updateUI(){

  document.getElementById('balDisp').textContent=remaining.toLocaleString()+'g';
  document.getElementById('betDisp').textContent=totalBet().toLocaleString()+'g';
  updateProbeIndicators();
}

// ---- CANVAS WHEEL ----
const canvas = document.getElementById('wheelCanvas');
const ctx    = canvas.getContext('2d');

let wheelAngle=0, ballAngle=0, ballRadius=0;
let wheelSpeed=0, ballSpeed=0, animId=null;
let spinDone=false;
let ballRadiusFactor=0.615;
let ballAngleOffset=-0.072;
let ballBaseAngle=0;
let ballBounce=0;

// ---- SOUNDS ----
const spinAudio = new Audio('./spin-sound.mp3');
spinAudio.loop = true;
spinAudio.volume = 0.8;

const ballAudio = new Audio('./roulette-ball.mp3');
ballAudio.loop = true;
ballAudio.volume = 0.9;

const clickAudio = new Audio('./click-sound.mp3');
clickAudio.volume = 1.0;
function playClick(){
  clickAudio.currentTime = 0;
  clickAudio.play().catch(()=>{});
}

function syncCanvasSize(){
  const vh=window.innerHeight/100;
  const sz=Math.round(parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--wheel-size'))*vh);
  canvas.width=sz; canvas.height=sz;
}

function drawWheel(){
  const W=canvas.width, cx=W/2, cy=W/2, R=W/2;
  ctx.clearRect(0,0,W,W);

  // Outer rim
  const rimGrad=ctx.createRadialGradient(cx,cy,R*0.88,cx,cy,R);
  rimGrad.addColorStop(0,'#5a2d0c'); rimGrad.addColorStop(0.5,'#8b4513'); rimGrad.addColorStop(1,'#3a1a00');
  ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.fillStyle=rimGrad; ctx.fill();

  const sliceAngle=(Math.PI*2)/SLOTS;
  for(let i=0;i<SLOTS;i++){
    const a=wheelAngle+i*sliceAngle-sliceAngle/2;
    const num=WHEEL_ORDER[i], col=colorOf(num);
    ctx.beginPath(); ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,R*0.86,a,a+sliceAngle); ctx.closePath();
    ctx.fillStyle=col==='green'?'#1a6e2e':col==='red'?'#cc2200':'#111';
    ctx.fill();
    ctx.strokeStyle='rgba(200,160,80,0.3)'; ctx.lineWidth=0.5; ctx.stroke();
    ctx.save(); ctx.translate(cx,cy); ctx.rotate(a+sliceAngle/2);
    ctx.translate(R*0.70,0); ctx.rotate(Math.PI/2);
    ctx.fillStyle='#fff'; ctx.font=`bold ${Math.round(R*0.055)}px Arial`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(String(num),0,0); ctx.restore();
  }

  // Inner gold hub
  const innerGrad=ctx.createRadialGradient(cx*0.9,cy*0.9,0,cx,cy,R*0.38);
  innerGrad.addColorStop(0,'#d4a843'); innerGrad.addColorStop(0.4,'#8b6914');
  innerGrad.addColorStop(0.8,'#5a3d00'); innerGrad.addColorStop(1,'#2a1800');
  ctx.beginPath(); ctx.arc(cx,cy,R*0.38,0,Math.PI*2); ctx.fillStyle=innerGrad; ctx.fill();
  [0.87,0.89,0.91].forEach(r=>{ ctx.beginPath(); ctx.arc(cx,cy,R*r,0,Math.PI*2); ctx.strokeStyle='rgba(210,170,80,0.4)'; ctx.lineWidth=1; ctx.stroke(); });
  [0.37,0.39].forEach(r=>{ ctx.beginPath(); ctx.arc(cx,cy,R*r,0,Math.PI*2); ctx.strokeStyle='rgba(210,170,80,0.5)'; ctx.lineWidth=1.5; ctx.stroke(); });

  // Ball
  if(ballRadius>0){
    const br=R*0.04;
    const dispR=ballRadius+ballBounce;
    const bx=cx+dispR*Math.cos(ballAngle), by=cy+dispR*Math.sin(ballAngle);
    ctx.beginPath(); ctx.arc(bx,by,br,0,Math.PI*2);
    const bg=ctx.createRadialGradient(bx-br*0.4,by-br*0.4,0,bx,by,br);
    bg.addColorStop(0,'#fff'); bg.addColorStop(1,'#aaa');
    ctx.fillStyle=bg; ctx.fill(); ctx.strokeStyle='#888'; ctx.lineWidth=1; ctx.stroke();
  }

  // Center cap
  const capG=ctx.createRadialGradient(cx*0.96,cy*0.96,0,cx,cy,R*0.07);
  capG.addColorStop(0,'#ffe066'); capG.addColorStop(1,'#8b6914');
  ctx.beginPath(); ctx.arc(cx,cy,R*0.07,0,Math.PI*2); ctx.fillStyle=capG; ctx.fill();
  ctx.strokeStyle='rgba(210,170,80,0.8)'; ctx.lineWidth=2; ctx.stroke();

  // Pointer
  ctx.save(); ctx.translate(cx,R*0.13);
  ctx.beginPath(); ctx.moveTo(0,-R*0.05); ctx.lineTo(-R*0.03,R*0.05); ctx.lineTo(R*0.03,R*0.05);
  ctx.closePath(); ctx.fillStyle='#ffd700'; ctx.fill(); ctx.restore();
}

function animate(){
  if(!spinning){ drawWheel(); return; }
  wheelAngle+=wheelSpeed; ballAngle-=ballSpeed;
  ballSpeed*=0.9945; wheelSpeed*=0.998;
  const W=canvas.width, R=W/2;
  const maxR=R*0.87, minR=R*ballRadiusFactor;
  const t=Math.max(0,(ballSpeed-0.005)/(0.08-0.005));
  ballRadius=minR+(maxR-minR)*t;
  // Bounce effect in last ~1s: ballSpeed roughly 0.005-0.018 range
  if(ballSpeed<0.022&&!spinDone){
    const bounceT=(0.022-ballSpeed)/0.017; // 0→1 as speed approaches stop
    ballBounce=Math.sin(Date.now()*0.03)*R*0.018*bounceT;
  } else {
    ballBounce=0;
  }
  if(ballSpeed<0.005&&!spinDone){
    spinDone=true; ballBounce=0;
    spinAudio.pause(); spinAudio.currentTime=0;
ballAudio.pause(); ballAudio.currentTime=0;
    const sliceAngle=(Math.PI*2)/SLOTS;
    let rel=((ballAngle-wheelAngle)%(Math.PI*2)+Math.PI*2)%(Math.PI*2);
    const slot=Math.floor(rel/sliceAngle)%SLOTS;
    winNumber=WHEEL_ORDER[slot];
    ballBaseAngle=wheelAngle+slot*sliceAngle+sliceAngle/2;
    ballAngle=ballBaseAngle+ballAngleOffset;
    ballRadius=R*ballRadiusFactor;
    drawWheel(); spinning=false; cancelAnimationFrame(animId);
    setTimeout(showResult,700); return;
  }
  drawWheel(); animId=requestAnimationFrame(animate);
}

async function spin(){
  if(spinning||totalBet()===0) return;
  const tot = totalBet();
  if (tot > balance) return;
  document.getElementById('spinBtn').disabled=true;
  // Wager the entire round total with the server before any animation
  // starts — if the wager is rejected, balance stays untouched and the
  // round never begins.
  try {
    await PL.wager('roulette', tot);
    betsArePending=false; // server now owns the bet — local display shouldn't subtract again
  } catch (e) {
    document.getElementById('spinBtn').disabled=false;
    if (e instanceof PL.errors.PLInsufficientFunds) {
      const banner = document.getElementById('pl-banner');
      banner.textContent = 'Insufficient bank — wager rejected.';
      banner.style.background = '#a30000';
      banner.style.display = 'block';
      setTimeout(()=>{ banner.style.display='none'; }, 3000);
    }
    return;
  }
  playClick();
  syncCanvasSize();
  lastBets={...bets}; spinning=true; spinDone=false;
  document.getElementById('resultBanner').style.display='none';
  document.getElementById('rebetBtn').style.visibility='hidden';
  const R=canvas.width/2;
  wheelSpeed=0.05+Math.random()*0.03; ballSpeed=0.14+Math.random()*0.04;
  ballRadius=R*0.87; ballAngle=Math.random()*Math.PI*2;
  spinAudio.currentTime=0; spinAudio.play().catch(()=>{});
ballAudio.currentTime=0; ballAudio.play().catch(()=>{});
  animId=requestAnimationFrame(animate);
}

// ---- PAYOUT ----
function calcPayout(wn){
  let total=0;
  const nNum=wn==='00'?-1:Number(wn);
  Object.entries(bets).forEach(([k,amt])=>{
    let win=0;
    if(k===String(wn)||k===wn)            { win=amt*36; }
    else if(k==='red'   &&colorOf(wn)==='red')  { win=amt*2; }
    else if(k==='black' &&colorOf(wn)==='black'){ win=amt*2; }
    else if(k==='odd'   &&nNum>0&&nNum%2!==0)   { win=amt*2; }
    else if(k==='even'  &&nNum>0&&nNum%2===0)   { win=amt*2; }
    else if(k==='1-18'  &&nNum>=1&&nNum<=18)    { win=amt*2; }
    else if(k==='19-36' &&nNum>=19&&nNum<=36)   { win=amt*2; }
    else if(k==='1st12' &&nNum>=1&&nNum<=12)    { win=amt*3; }
    else if(k==='2nd12' &&nNum>=13&&nNum<=24)   { win=amt*3; }
    else if(k==='3rd12' &&nNum>=25&&nNum<=36)   { win=amt*3; }
    total+=win;
  });
  return total;
}

async function showResult(){
  const payout=calcPayout(winNumber);
  // Server credits the gross payout (0 = pure loss).
  try { await PL.settle('roulette', payout); }
  catch (e) { /* error surfaced to console; balance is already authoritative */ console.error('settle failed', e); }
  const net=payout-totalBet();
  const col=colorOf(winNumber);
  const won = net > 0;
  document.getElementById('rTitle').textContent=won?'WINNER!':'You Lost';
  document.getElementById('rTitle').style.color=won?'#4aff7a':'#ff4444';
  document.getElementById('rNum').textContent=winNumber;
  document.getElementById('rNum').style.color=col==='red'?'#ff5555':col==='green'?'#4aff7a':'#ccc';
  const rPay = document.getElementById('rPay');
  if(won){ rPay.textContent='+'+net.toLocaleString()+'g'; rPay.style.color='#4aff7a'; }
  else { rPay.textContent=net.toLocaleString()+'g'; rPay.style.color='#ff5555'; }
  document.getElementById('resultBanner').style.display='flex';
  document.getElementById('spinBtn').disabled=false;
  document.getElementById('rebetBtn').style.visibility='visible';
  bets={}; updateUI();
}

function newRound(){
  playClick();
  document.getElementById('resultBanner').style.display='none';
  winNumber=null; ballRadius=0; drawWheel();
  betsArePending=true; // back to bet-placement phase
  updateUI();
}

let activeProbe = null, didDrag = false, dragData = {};

function createProbes(){
  const layer = document.getElementById('probeLayer');
  PROBES.forEach(p => {
    const el = document.createElement('div');
    el.id = `probe-${p.id}`;
    el.className = 'probe-circle';

    el.appendChild(ind);
    el.addEventListener('mousedown', e => { e.preventDefault(); startProbeDrag(e, p); });
    el.addEventListener('wheel', e => { e.preventDefault(); resizeProbe(p, e.deltaY < 0 ? 4 : -4); }, {passive:false});
    el.addEventListener('click', () => { if(!didDrag) placeBet(p.betKey); });
    layer.appendChild(el);
  });
  updateProbePanel();
}

function applyProbeStyle(el, p){
  el.style.left       = p.x + '%';
  el.style.top        = p.y + '%';
  el.style.width      = p.w + 'px';
  el.style.height     = p.h + 'px';
  el.style.background = 'transparent';
  el.style.border     = 'none';
  el.style.color      = 'transparent';
}

function startProbeDrag(e, p){
  activeProbe = p; didDrag = false;
  const el = document.getElementById(`probe-${p.id}`);
  const rect = el.getBoundingClientRect();
  const vcx = rect.left + rect.width / 2;
  const vcy = rect.top  + rect.height / 2;
  dragData = {
    startX: e.clientX, startY: e.clientY,
    offsetX: e.clientX - vcx, offsetY: e.clientY - vcy,
    ratioX: vcx > 0 ? p.x / (vcx / window.innerWidth)  : 1,
    ratioY: vcy > 0 ? p.y / (vcy / window.innerHeight) : 1,
  };
  document.addEventListener('mousemove', onProbeDrag);
  document.addEventListener('mouseup',   stopProbeDrag);
}
function onProbeDrag(e){
  if(!activeProbe) return;
  if(Math.abs(e.clientX - dragData.startX) > 3 || Math.abs(e.clientY - dragData.startY) > 3) didDrag = true;
  if(!didDrag) return;
  const tx = e.clientX - dragData.offsetX;
  const ty = e.clientY - dragData.offsetY;
  activeProbe.x = parseFloat(((tx / window.innerWidth)  * dragData.ratioX).toFixed(2));
  activeProbe.y = parseFloat(((ty / window.innerHeight) * dragData.ratioY).toFixed(2));
  const el = document.getElementById(`probe-${activeProbe.id}`);
  el.style.left = activeProbe.x + '%';
  el.style.top  = activeProbe.y + '%';
  updateProbePanel();
}
function stopProbeDrag(){
  activeProbe = null;
  document.removeEventListener('mousemove', onProbeDrag);
  document.removeEventListener('mouseup',   stopProbeDrag);
}
function resizeProbe(p, delta){
  p.w = Math.max(10, Math.min(500, p.w + delta));
  p.h = Math.max(10, Math.min(200, p.h + Math.round(delta/2)));
  const el = document.getElementById(`probe-${p.id}`);
  applyProbeStyle(el, p);
  updateProbePanel();
}
function updateProbePanel(){
  const rows = document.getElementById('probeRows');
  if(!rows) return;
  rows.innerHTML = PROBES.map(p =>
    `<div class="probe-row">
      <span class="probe-lbl" style="color:${p.color}">${p.label||p.id}</span>
      <span class="probe-val">x:${p.x}% y:${p.y}% ${p.w}×${p.h}</span>
    </div>`
  ).join('');
}
function copyProbes(){
  const txt = PROBES.map(p => `{ id:'${p.id}', x:${p.x}, y:${p.y}, w:${p.w}, h:${p.h}, color:'${p.color}', betKey:'${p.betKey}', label:'${p.label}' },`).join('\n');

function applyCandle(el, c){
  el.style.left  = c.x + '%';
  el.style.top   = c.y + '%';
}

function setCandleX(id, val, display){
  const c = CANDLES.find(x=>x.id===id);
  c.x = parseFloat(val);
  display.textContent = val + '%';
  document.getElementById(`candle-${id}`).style.left = c.x + '%';
}
function setCandleY(id, val, display){
  const c = CANDLES.find(x=>x.id===id);
  c.y = parseFloat(val);
  display.textContent = val + '%';
  document.getElementById(`candle-${id}`).style.top = c.y + '%';
}
function setCandleS(id, val, display){
  const c = CANDLES.find(x=>x.id===id);
  c.scale = parseFloat(val);
  display.textContent = parseFloat(val).toFixed(1);
  // rebuild this candle
  const layer = document.getElementById('candleLayer');
  const old = document.getElementById(`candle-${id}`);
  const wrap = document.createElement('div');
  wrap.className = 'candle-wrap';
  wrap.id = `candle-${id}`;
  const glowSize = 60 * c.scale;
  wrap.innerHTML = `
    <div class="candle-glow" style="width:${glowSize}px;height:${glowSize}px;bottom:${c.h*c.scale*0.3}px"></div>
    <div class="candle-flame-wrap" style="transform:scale(${c.scale})">
      <div class="candle-flame" style="animation-delay:${(c.id*0.07).toFixed(2)}s"></div>
      <div class="candle-flame-inner" style="animation-delay:${(c.id*0.05).toFixed(2)}s"></div>
      <div class="candle-wick"></div>
    </div>
    <div class="candle-body" style="height:${c.h*c.scale}px;width:${10*c.scale}px">
      <div class="candle-drip"></div>
    </div>`;
  applyCandle(wrap, c);
  layer.replaceChild(wrap, old);
}

function buildCandlePanel(){
  const rows = document.getElementById('candleRows');
  if(!rows) return;
  rows.innerHTML = CANDLES.map(c => `
    <div class="cd-group">
      <div class="cd-title">Candle ${c.id}</div>
      <div class="cd-row"><span class="cd-lbl">X</span>
        <input type="range" min="${(c.x-5).toFixed(1)}" max="${(c.x+5).toFixed(1)}" step="0.05" value="${c.x}"
          oninput="setCandleX(${c.id},this.value,this.nextElementSibling)">
        <span class="cd-val">${c.x}%</span></div>
      <div class="cd-row"><span class="cd-lbl">Y</span>
        <input type="range" min="${(c.y-5).toFixed(1)}" max="${(c.y+5).toFixed(1)}" step="0.05" value="${c.y}"
          oninput="setCandleY(${c.id},this.value,this.nextElementSibling)">
        <span class="cd-val">${c.y}%</span></div>
      <div class="cd-row"><span class="cd-lbl">S</span>
        <input type="range" min="${Math.max(0.1,c.scale-0.5).toFixed(2)}" max="${(c.scale+0.5).toFixed(2)}" step="0.01" value="${c.scale}"
          oninput="setCandleS(${c.id},this.value,this.nextElementSibling)">
        <span class="cd-val">${c.scale.toFixed(2)}</span></div>
    </div>`).join('');
}

function copyCandles(){
  const txt = CANDLES.map(c =>
    `  { id:${c.id}, x:${c.x}, y:${c.y}, scale:${c.scale.toFixed(1)}, h:${c.h} },`
  ).join('\n');
  navigator.clipboard.writeText(txt).then(()=>{
    const btn = document.querySelector('.cdcopy');
    btn.textContent='COPIED!'; setTimeout(()=>btn.textContent='📋 COPY ALL',1500);
  });
}

// ---- PARTICLE FLAME ----
const TORCH = { x:92.5, y:19.9, size:30 };
const flameCanvas = document.getElementById('flameCanvas');
const fctx = flameCanvas.getContext('2d');
const particles = [];

function resizeFlameCanvas(){
  const s = TORCH.size;
  const W = s * 5, H = s * 8;
  flameCanvas.width  = W;
  flameCanvas.height = H;
  flameCanvas.style.width  = W + 'px';
  flameCanvas.style.height = H + 'px';
  flameCanvas.style.left = (window.innerWidth  * TORCH.x/100 - W/2) + 'px';
  flameCanvas.style.top  = (window.innerHeight * TORCH.y/100 - H)   + 'px';
}

function spawnParticle(){
  const s = TORCH.size;
  const spread = s * 0.8;
  particles.push({
    x:  flameCanvas.width/2 + (Math.random()-0.5)*spread*0.6,
    y:  flameCanvas.height,
    vx: (Math.random()-0.5) * s * 0.018,
    vy: -(Math.random()*s*0.05 + s*0.035),
    life: 0,
    maxLife: 70 + Math.random()*50,
    r: s*0.5 + Math.random()*s*0.4,
  });
}

function tickParticles(){
  const W = flameCanvas.width, H = flameCanvas.height;
  fctx.clearRect(0,0,W,H);

  // spawn 3-6 per frame
  const count = 2 + Math.random()*2|0;
  for(let i=0;i<count;i++) spawnParticle();

  for(let i=particles.length-1;i>=0;i--){
    const p = particles[i];
    p.x  += p.vx + Math.sin(p.life*0.15)*(0.2);
    p.y  += p.vy;
    p.vy *= 0.97;
    p.r  *= 0.978;
    p.life++;
    if(p.life>p.maxLife||p.r<0.5){ particles.splice(i,1); continue; }

    const t = p.life/p.maxLife; // 0=birth 1=death
    // colour: white-yellow → orange → red → transparent
    let r,g,b,a;
    if(t<0.2){       r=255; g=255-(t/0.2)*100|0; b=200-(t/0.2)*200|0; a=t/0.2; }
    else if(t<0.55){ const q=(t-0.2)/0.35; r=255; g=155-q*100|0; b=0; a=1; }
    else if(t<0.8){  const q=(t-0.55)/0.25; r=255-q*80|0; g=55-q*55|0; b=0; a=1-q*0.3; }
    else {           const q=(t-0.8)/0.2; r=175; g=0; b=0; a=0.7-q*0.7; }

    const grad = fctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r);
    grad.addColorStop(0,   `rgba(${r},${g},${b},${a})`);
    grad.addColorStop(0.4, `rgba(${r},${g},${b},${a*0.6})`);
    grad.addColorStop(1,   `rgba(${r},${g},${b},0)`);
    fctx.beginPath();
    fctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    fctx.fillStyle=grad;
    fctx.fill();
  }
  requestAnimationFrame(tickParticles);
}

function buildTorch(){ resizeFlameCanvas(); }

  TORCH[prop] = parseFloat(val);
  display.textContent = prop==='size' ? val : parseFloat(val).toFixed(1)+'%';

}
