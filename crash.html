<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dragon Hunt - HoH Casino</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cinzel+Decorative:wght@700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  width:100%;height:100%;overflow:hidden;
  background:#05030a;
  color:#f5e6c8;
  font-family:'Cinzel',serif;
  user-select:none;
}

/* Whole game scaled to fit viewport while preserving aspect */
#fit-wrap{
  position:fixed;inset:0;
  display:flex;align-items:center;justify-content:center;
}
#stage{
  position:relative;
  width:1280px;height:800px;
  background:#000;
  transform-origin:center center;
}

/* Volcano backdrop covers full stage */
#bg-layer{
  position:absolute;inset:0;
  background:url('crash-assets/bg.png') center/cover no-repeat;
  z-index:0;
}
#bg-vignette{
  position:absolute;inset:0;
  background:radial-gradient(ellipse at center, transparent 35%, rgba(0,0,0,0.55) 100%);
  z-index:1;pointer-events:none;
}

/* Side panels — sidebar2 = left (HISTORY/Balance/Bet), sidebar3 = right (auto config) */
.sidebar{
  position:absolute;
  width:280px;height:760px;
  top:20px;
  background-size:100% 100%;
  background-repeat:no-repeat;
  z-index:5;
  padding:80px 22px 26px 22px;
  display:flex;flex-direction:column;
  font-family:'Cinzel',serif;
}
#sidebar-left{ left:14px; background-image:url('crash-assets/sidebar2.png'); }
#sidebar-right{ right:14px; background-image:url('crash-assets/sidebar3.png'); }
.panel{
  margin-bottom:14px;
}
.panel-label{
  font-family:'Cinzel Decorative',serif;
  font-size:13px;
  letter-spacing:3px;
  color:#ffd28a;
  text-shadow:0 0 6px rgba(255,200,80,0.5);
  text-transform:uppercase;
  margin-bottom:6px;
  text-align:center;
}
.panel-value{
  font-size:18px;color:#ffe9b3;text-align:center;
  text-shadow:0 0 8px rgba(255,200,80,0.4);
  font-weight:700;
}
.panel-value strong{ color:#ffd700; font-size:22px; }
.history-strip{
  display:flex;flex-wrap:wrap;gap:4px;justify-content:center;
  min-height:42px;
}
.history-item{
  font-size:11px;font-weight:bold;padding:2px 6px;border-radius:3px;
  background:rgba(0,0,0,0.55);border:1px solid rgba(255,215,0,0.18);
}
.history-item.red    { color:#ff6464; }
.history-item.yellow { color:#ffcc00; }
.history-item.green  { color:#5eff8a; }
.auto-input{
  width:100%;padding:6px 8px;text-align:center;
  background:rgba(0,0,0,0.55);
  border:1px solid rgba(255,200,80,0.4);
  color:#ffe9b3;font-family:'Cinzel',serif;font-size:16px;
  border-radius:3px;outline:none;
}
.auto-toggle{
  width:100%;padding:6px;text-align:center;cursor:pointer;
  background:rgba(0,0,0,0.55);
  border:1px solid rgba(255,200,80,0.4);
  color:#ffe9b3;font-family:'Cinzel',serif;font-size:14px;
  border-radius:3px;letter-spacing:2px;
}
.auto-toggle.on{
  background:rgba(255,200,80,0.18);
  color:#ffd700;border-color:#ffd700;
  box-shadow:0 0 10px rgba(255,200,80,0.4);
}

/* Central play area, framed by border.png */
#play-frame{
  position:absolute;
  left:300px;top:30px;
  width:680px;height:540px;
  z-index:3;
  background-image:url('crash-assets/border.png');
  background-size:100% 100%;
  background-repeat:no-repeat;
  pointer-events:none;
}
#play-area{
  position:absolute;
  left:332px;top:62px;       /* inside the border frame */
  width:616px;height:476px;
  z-index:2;
  overflow:hidden;
}

/* Harpoon platform anchors at the bottom-left of the play area */
#platform{
  position:absolute;
  left:8px;bottom:0;
  width:152px;height:319px;     /* 500x1050 scaled to ~30% */
  background:url('crash-assets/platform.png') center bottom/100% 100% no-repeat;
  z-index:6;
  filter:drop-shadow(0 4px 8px rgba(0,0,0,0.7));
}

/* Dragon sprite — animated via JS */
#dragon{
  position:absolute;
  width:130px;height:88px;
  z-index:7;
  pointer-events:none;
  transition:filter 0.2s;
  filter:drop-shadow(0 2px 6px rgba(0,0,0,0.6));
}
#dragon.crashed{
  filter:drop-shadow(0 0 18px rgba(220,40,40,0.9)) drop-shadow(0 4px 8px rgba(0,0,0,0.8));
}

/* Harpoon projectile (visible only briefly during crash) */
#harpoon{
  position:absolute;
  width:84px;height:43px;       /* 421x215 scaled */
  background:url('crash-assets/harpoon.png') center/contain no-repeat;
  z-index:8;
  display:none;
  pointer-events:none;
  filter:drop-shadow(0 2px 4px rgba(0,0,0,0.8));
}

/* Multiplier overlay — top-center of play area */
#mult-overlay{
  position:absolute;
  top:30px;left:50%;
  transform:translateX(-50%);
  font-family:'Cinzel Decorative',serif;
  font-size:64px;font-weight:900;
  color:#ffd700;
  text-shadow:
    0 0 20px rgba(255,200,80,0.7),
    0 0 40px rgba(255,140,40,0.5),
    0 4px 4px rgba(0,0,0,0.9);
  z-index:9;
  letter-spacing:2px;
  pointer-events:none;
}
#mult-overlay.crashed{
  color:#ff4040;
  text-shadow:
    0 0 22px rgba(255,60,60,0.8),
    0 0 44px rgba(255,0,0,0.4),
    0 4px 4px rgba(0,0,0,0.9);
}

/* Phase label — below multiplier */
#phase-label{
  position:absolute;
  top:108px;left:50%;
  transform:translateX(-50%);
  font-family:'Cinzel',serif;
  font-size:16px;letter-spacing:5px;
  color:#ffe9b3;
  text-shadow:0 0 8px rgba(0,0,0,0.9);
  z-index:9;
  text-transform:uppercase;
  pointer-events:none;
  opacity:0.8;
}

/* Result overlay (WIN / BUST) */
#result-overlay{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  font-family:'Cinzel Decorative',serif;
  font-size:54px;font-weight:900;
  z-index:10;
  pointer-events:none;
  opacity:0;
  transition:opacity 0.25s, transform 0.25s;
  letter-spacing:6px;
}
#result-overlay.show{ opacity:1; transform:translate(-50%,-58%) scale(1.05); }
#result-overlay.win{
  color:#5eff8a;
  text-shadow:0 0 20px rgba(94,255,138,0.8),0 4px 4px rgba(0,0,0,0.9);
}
#result-overlay.lose{
  color:#ff4040;
  text-shadow:0 0 20px rgba(255,64,64,0.8),0 4px 4px rgba(0,0,0,0.9);
}

/* Bottom controls strip */
#bottom-bar{
  position:absolute;
  left:300px;right:300px;
  bottom:14px;
  height:200px;
  z-index:5;
  padding:14px 20px;
  display:flex;flex-direction:column;justify-content:space-between;
  background:linear-gradient(180deg, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.85) 100%);
  border:1px solid rgba(255,200,80,0.3);
  border-radius:6px;
  box-shadow:inset 0 0 30px rgba(0,0,0,0.6);
}

.chips-row{
  display:flex;justify-content:center;gap:14px;
}
.chip-btn{
  width:62px;height:62px;border-radius:50%;
  border:3px solid rgba(255,200,80,0.4);
  cursor:pointer;background:none;padding:0;
  transition:transform 0.12s,border-color 0.15s,box-shadow 0.15s;
  -webkit-tap-highlight-color:transparent;
}
.chip-btn img{
  width:100%;height:100%;border-radius:50%;
  pointer-events:none;display:block;
}
.chip-btn:hover{
  transform:scale(1.08);
  border-color:rgba(255,215,0,0.7);
  box-shadow:0 0 12px rgba(255,200,80,0.5);
}
.chip-btn.selected{
  border-color:#ffd700;
  box-shadow:0 0 14px rgba(255,215,0,0.7);
}

.controls-row{
  display:flex;align-items:center;justify-content:space-between;gap:12px;
}
.btn{
  padding:10px 20px;
  background:linear-gradient(135deg,#3a1a06 0%,#5a2c0a 100%);
  color:#ffd28a;
  border:2px solid #8a5a1a;
  border-radius:5px;
  font-family:'Cinzel',serif;font-size:14px;font-weight:700;letter-spacing:2px;
  cursor:pointer;
  transition:transform 0.1s,filter 0.15s;
  text-transform:uppercase;
}
.btn:hover:not(:disabled){ filter:brightness(1.25); transform:translateY(-1px); }
.btn:disabled{ opacity:0.35; cursor:not-allowed; }
.btn-bet{
  background:linear-gradient(135deg,#1a4a1a 0%,#2a7a2a 100%);
  border-color:#4aff7a;color:#ddffe1;font-size:18px;padding:14px 28px;
}
.btn-cashout{
  background:linear-gradient(135deg,#7a4a00 0%,#c08020 100%);
  border-color:#ffd700;color:#fff;font-size:18px;padding:14px 28px;
  animation:pulseGold 0.8s ease-in-out infinite;
}
@keyframes pulseGold{
  0%,100%{ box-shadow:0 0 8px rgba(255,215,0,0.5); }
  50%    { box-shadow:0 0 22px rgba(255,215,0,0.95); }
}
.bet-display{
  display:flex;flex-direction:column;align-items:center;
  padding:6px 18px;
  border:1px solid rgba(255,200,80,0.4);
  background:rgba(0,0,0,0.55);
  border-radius:4px;
  min-width:120px;
}
.bet-display small{ font-size:11px;letter-spacing:3px;color:#cfa15a; }
.bet-display span{ font-size:22px;font-weight:bold;color:#ffd700;text-shadow:0 0 10px rgba(255,200,80,0.5); }

/* Mute button — top-right corner */
#mute-btn{
  position:absolute;top:20px;right:24px;z-index:50;
  background:rgba(0,0,0,0.6);border:1px solid rgba(255,200,80,0.4);
  color:#ffd28a;font-size:18px;padding:5px 10px;border-radius:5px;cursor:pointer;
  font-family:'Cinzel',serif;
}

/* PL banner */
#pl-banner{
  position:fixed;top:0;left:0;right:0;z-index:9998;
  background:#a30000;color:#fff;text-align:center;padding:9px;
  font-family:sans-serif;font-size:14px;display:none;
}
</style>
</head>
<body>
<div id="pl-banner"></div>
<script src="pl-bridge.js?v=20260509a"></script>

<div id="fit-wrap">
  <div id="stage">
    <div id="bg-layer"></div>
    <div id="bg-vignette"></div>

    <button id="mute-btn" onclick="toggleMute()" title="Toggle music">&#x1f50a;</button>
    <audio id="bgMusic" loop src="./bg-music.mp3"></audio>
    <audio id="sndFlap"  loop src="crash-assets/flap.mp3"></audio>
    <audio id="sndArrow"      src="crash-assets/arrow.mp3"></audio>
    <audio id="sndDead"       src="crash-assets/dead.mp3"></audio>

    <!-- Left sidebar: history + bank + current bet -->
    <aside id="sidebar-left" class="sidebar">
      <div class="panel">
        <div class="panel-label">History</div>
        <div class="history-strip" id="history"></div>
      </div>
      <div class="panel">
        <div class="panel-label">Balance</div>
        <div class="panel-value"><strong id="balance">…</strong>g</div>
      </div>
      <div class="panel">
        <div class="panel-label">Current Bet</div>
        <div class="panel-value"><strong id="bet-amount">0</strong>g</div>
      </div>
    </aside>

    <!-- Right sidebar: auto bet + auto cashout -->
    <aside id="sidebar-right" class="sidebar">
      <div class="panel">
        <div class="panel-label">Auto Bet</div>
        <button class="auto-toggle" id="auto-bet-toggle" onclick="toggleAutoBet()">OFF</button>
      </div>
      <div class="panel">
        <div class="panel-label">Auto Cashout</div>
        <input class="auto-input" type="text" id="auto-cashout" value="2.00" maxlength="6">
        <div style="text-align:center;font-size:10px;color:#cfa15a;margin-top:4px;letter-spacing:2px;">multiplier x</div>
      </div>
      <div class="panel">
        <div class="panel-label">Last Win</div>
        <div class="panel-value"><strong id="last-win">0</strong>g</div>
      </div>
    </aside>

    <!-- Central play area -->
    <div id="play-area">
      <div id="platform"></div>
      <img id="dragon" src="sprites/dragon/fly/dragon_fly_00.png" alt="dragon">
      <div id="harpoon"></div>
      <div id="mult-overlay">1.00x</div>
      <div id="phase-label">Place Your Bets</div>
      <div id="result-overlay"></div>
    </div>
    <div id="play-frame"></div>

    <!-- Bottom controls -->
    <div id="bottom-bar">
      <div class="chips-row">
        <button class="chip-btn" id="chip-100"   onclick="selectChip(100)"  ><img src="chip-100.png"   alt="100"></button>
        <button class="chip-btn" id="chip-500"   onclick="selectChip(500)"  ><img src="chip-500.png"   alt="500"></button>
        <button class="chip-btn" id="chip-1000"  onclick="selectChip(1000)" ><img src="chip-1000.png"  alt="1K"></button>
        <button class="chip-btn" id="chip-5000"  onclick="selectChip(5000)" ><img src="chip-5000.png"  alt="5K"></button>
        <button class="chip-btn" id="chip-10000" onclick="selectChip(10000)"><img src="chip-10000.png" alt="10K"></button>
      </div>
      <div class="controls-row">
        <button class="btn" id="btn-clear" onclick="clearBet()">Clear</button>
        <div class="bet-display">
          <small>BET</small>
          <span id="bet-display">0g</span>
        </div>
        <button class="btn btn-bet"     id="btn-bet"     onclick="placeBet()">Bet</button>
        <button class="btn btn-cashout" id="btn-cashout" onclick="cashOut()" style="display:none;">Cash Out</button>
      </div>
    </div>
  </div>
</div>

<script>
/* ───────── FIT-TO-VIEWPORT ───────── */
function fitStage(){
  const stage = document.getElementById('stage');
  const sx = window.innerWidth  / 1280;
  const sy = window.innerHeight / 800;
  const s  = Math.min(sx, sy);
  stage.style.transform = `scale(${s})`;
}
window.addEventListener('resize', fitStage);
fitStage();

/* ───────── PL BRIDGE ───────── */
let balance = 0;
let bridgeReady = false;
(async function(){
  const banner = document.getElementById('pl-banner');
  function showBanner(msg){ banner.textContent = msg; banner.style.display = 'block'; }
  if(!window.PL){ showBanner('PL bridge not loaded.'); return; }
  try{
    const info = await PL.init();
    balance = info.balance;
    bridgeReady = true;
    PL.onBalanceChanged((b)=>{ balance = b; updateBalanceDisplay(); });
    updateBalanceDisplay();
  }catch(e){
    showBanner('Casino offline: ' + (e && e.message || e) + ' — close this tab and buy in from a Casino Stone.');
  }
})();
async function plWagerCrash(amount){
  try{ await PL.wager('crash', amount); return true; }
  catch(e){
    const banner = document.getElementById('pl-banner');
    if(e instanceof PL.errors.PLInsufficientFunds){
      banner.textContent = 'Insufficient bank — bet rejected.';
      banner.style.display = 'block';
      setTimeout(()=>{ banner.style.display='none'; }, 2500);
    }
    return false;
  }
}
async function plSettleCrash(amount){
  if(amount <= 0) return;
  try{ await PL.settle('crash', amount); }
  catch(e){ console.error('crash settle failed', e); }
}

/* ───────── STATE ───────── */
const PHASE = { BETTING:0, FLYING:1, CRASHED:2 };
let phase = PHASE.BETTING;

let currentBet = 0;
let selectedChip = null;
let autoBet = false;
let lastWin = 0;
let crashHistory = [];

let multiplier = 1.0;
let crashPoint = 1.0;
let cashedOut = false;
let cashoutMult = 0;
let betPlaced = false;
let lastBetAmount = 0;
let lastChipSelected = null;

/* Dragon position state */
const PLAY_W = 616, PLAY_H = 476;
const DRAGON_W = 130, DRAGON_H = 88;
const DRAGON_START_X = 156;     // just right of platform top
const DRAGON_END_X   = PLAY_W - DRAGON_W - 20;
const DRAGON_Y_BASE  = 180;
let dragonX = DRAGON_START_X;
let dragonY = DRAGON_Y_BASE;
let dragonRotation = 0;
let dragonFrame = 0;
let dragonAnimTimer = 0;
const DRAGON_ANIM_MS = 110;

/* Harpoon state */
let harpoonActive = false;
let harpoonStartX = 0, harpoonStartY = 0;
let harpoonTargetX = 0, harpoonTargetY = 0;
let harpoonProgress = 0;
let harpoonHit = false;

/* Crash anim */
let crashFallTime = 0;

/* ───────── DOM REFS ───────── */
const dragonEl   = document.getElementById('dragon');
const harpoonEl  = document.getElementById('harpoon');
const multEl     = document.getElementById('mult-overlay');
const phaseEl    = document.getElementById('phase-label');
const resultEl   = document.getElementById('result-overlay');
const balanceEl  = document.getElementById('balance');
const betDispEl  = document.getElementById('bet-display');
const betAmtEl   = document.getElementById('bet-amount');
const lastWinEl  = document.getElementById('last-win');
const btnBet     = document.getElementById('btn-bet');
const btnCashout = document.getElementById('btn-cashout');
const historyEl  = document.getElementById('history');
const acInput    = document.getElementById('auto-cashout');
const sndFlap    = document.getElementById('sndFlap');
const sndArrow   = document.getElementById('sndArrow');
const sndDead    = document.getElementById('sndDead');
const bgMusic    = document.getElementById('bgMusic');
bgMusic.volume = 0.4;
sndFlap.volume = 0.55;

/* ───────── AUDIO ───────── */
let _muted = false;
function toggleMute(){
  _muted = !_muted;
  bgMusic.muted = _muted;
  sndFlap.muted = _muted;
  sndArrow.muted = _muted;
  sndDead.muted = _muted;
  document.getElementById('mute-btn').innerHTML = _muted ? '&#x1f507;' : '&#x1f50a;';
}
function startAudio(){
  bgMusic.play().catch(()=>{});
}
document.addEventListener('pointerdown', startAudio, {once:true});
document.addEventListener('keydown',     startAudio, {once:true});

/* ───────── DRAGON SPRITES ───────── */
const flyFrames = [];
for(let i = 0; i < 5; i++){
  const img = new Image();
  img.src = `sprites/dragon/fly/dragon_fly_0${i}.png`;
  flyFrames.push(img);
}
const deadImg = new Image();
deadImg.src = 'sprites/dragon/fly/dragon_dead.png';

/* ───────── CRASH POINT GEN (4% house edge) ───────── */
function generateCrashPoint(){
  let r = Math.random();
  let cp = -1 / Math.log(r) * 0.96;
  while(cp < 1.0){
    r = Math.random();
    cp = -1 / Math.log(r) * 0.96;
  }
  return cp;
}

/* ───────── CHIP HANDLING ───────── */
function selectChip(val){
  if(phase !== PHASE.BETTING || betPlaced) return;
  selectedChip = val;
  document.querySelectorAll('.chip-btn').forEach(e => e.classList.remove('selected'));
  const el = document.getElementById('chip-' + val);
  if(el) el.classList.add('selected');
  if(currentBet + val <= balance){
    currentBet += val;
    updateBetDisplay();
  }
}
function clearBet(){
  if(phase !== PHASE.BETTING || betPlaced) return;
  currentBet = 0;
  selectedChip = null;
  document.querySelectorAll('.chip-btn').forEach(e => e.classList.remove('selected'));
  updateBetDisplay();
}
function updateBetDisplay(){
  betDispEl.textContent = currentBet.toLocaleString() + 'g';
  betAmtEl.textContent  = currentBet.toLocaleString();
}
function updateBalanceDisplay(){
  balanceEl.textContent = balance.toLocaleString();
}

/* ───────── BET / CASHOUT ───────── */
function placeBet(){
  if(phase !== PHASE.BETTING || currentBet <= 0) return;
  betPlaced = true;
  btnBet.disabled = true;
  lastBetAmount = currentBet;
  lastChipSelected = selectedChip;
}
async function cashOut(){
  if(phase !== PHASE.FLYING || cashedOut || !betPlaced) return;
  cashedOut = true;
  cashoutMult = multiplier;
  const winnings = Math.floor(currentBet * cashoutMult);
  await plSettleCrash(winnings);
  lastWin = winnings;
  lastWinEl.textContent = winnings.toLocaleString();
  showResult(true, 'cash out ' + cashoutMult.toFixed(2) + 'x  +' + winnings.toLocaleString() + 'g');
  btnCashout.style.display = 'none';
}

/* ───────── AUTO BET ───────── */
function toggleAutoBet(){
  autoBet = !autoBet;
  const t = document.getElementById('auto-bet-toggle');
  t.textContent = autoBet ? 'ON' : 'OFF';
  t.classList.toggle('on', autoBet);
}

/* ───────── HISTORY ───────── */
function addHistory(val){
  crashHistory.unshift(val);
  if(crashHistory.length > 12) crashHistory.pop();
  renderHistory();
}
function renderHistory(){
  historyEl.innerHTML = '';
  for(const v of crashHistory){
    const cls = v < 2 ? 'red' : v < 5 ? 'yellow' : 'green';
    historyEl.innerHTML += `<span class="history-item ${cls}">${v.toFixed(2)}x</span>`;
  }
}

/* ───────── RESULT OVERLAY ───────── */
function showResult(win, text){
  resultEl.textContent = text;
  resultEl.className = 'show ' + (win ? 'win' : 'lose');
  setTimeout(() => { resultEl.className = ''; }, 2400);
}

/* ───────── PHASE: BETTING ───────── */
let countdownInterval = null;
function startBetting(){
  phase = PHASE.BETTING;
  multiplier = 1.0;
  cashedOut = false;
  cashoutMult = 0;
  betPlaced = false;
  harpoonActive = false;
  harpoonHit = false;
  harpoonProgress = 0;
  crashFallTime = 0;
  dragonX = DRAGON_START_X;
  dragonY = DRAGON_Y_BASE;
  dragonRotation = 0;
  dragonFrame = 0;

  multEl.textContent = '1.00x';
  multEl.classList.remove('crashed');
  resultEl.className = '';
  harpoonEl.style.display = 'none';
  dragonEl.classList.remove('crashed');
  dragonEl.src = flyFrames[0].src;

  btnBet.style.display = 'inline-block';
  btnBet.disabled = false;
  btnCashout.style.display = 'none';

  // Auto-bet repeat
  if(autoBet && lastBetAmount > 0 && lastBetAmount <= balance){
    currentBet = lastBetAmount;
    updateBetDisplay();
    placeBet();
  }

  crashPoint = generateCrashPoint();

  let countdown = 3;
  phaseEl.textContent = 'Starting in ' + countdown + '...';
  if(countdownInterval) clearInterval(countdownInterval);
  countdownInterval = setInterval(() => {
    countdown--;
    if(countdown <= 0){
      clearInterval(countdownInterval);
      countdownInterval = null;
      startFlying();
    } else {
      phaseEl.textContent = 'Starting in ' + countdown + '...';
    }
  }, 1000);
}

/* ───────── PHASE: FLYING ───────── */
async function startFlying(){
  phase = PHASE.FLYING;
  phaseEl.textContent = '';
  btnBet.style.display = 'none';

  if(betPlaced){
    const ok = await plWagerCrash(currentBet);
    if(!ok){ betPlaced = false; return; }
    btnCashout.style.display = 'inline-block';
    btnCashout.textContent = 'Cash Out 1.00x';
  }

  sndFlap.currentTime = 0;
  sndFlap.play().catch(()=>{});
}

/* ───────── PHASE: CRASHED ───────── */
function triggerCrash(){
  phase = PHASE.CRASHED;
  multiplier = crashPoint;
  multEl.textContent = crashPoint.toFixed(2) + 'x';
  multEl.classList.add('crashed');
  phaseEl.textContent = 'Crashed';

  sndFlap.pause();
  sndFlap.currentTime = 0;

  // Launch harpoon from platform top toward current dragon position
  harpoonActive = true;
  harpoonHit = false;
  harpoonProgress = 0;
  harpoonStartX = 60;     // top of platform, slightly right
  harpoonStartY = 60;     // upper third of play area
  harpoonTargetX = dragonX + DRAGON_W * 0.4;
  harpoonTargetY = dragonY + DRAGON_H * 0.4;
  harpoonEl.style.display = 'block';
  sndArrow.currentTime = 0;
  sndArrow.play().catch(()=>{});

  btnCashout.style.display = 'none';

  if(betPlaced && !cashedOut){
    plSettleCrash(0);
    showResult(false, 'busted at ' + crashPoint.toFixed(2) + 'x');
  }

  addHistory(crashPoint);

  setTimeout(() => {
    currentBet = 0;
    selectedChip = null;
    document.querySelectorAll('.chip-btn').forEach(e => e.classList.remove('selected'));
    updateBetDisplay();
    startBetting();
  }, 3500);
}

/* ───────── GAME LOOP ───────── */
let lastTime = 0;
let tickAccum = 0;
function gameLoop(timestamp){
  const dt = lastTime ? (timestamp - lastTime) : 16;
  lastTime = timestamp;

  // Dragon flap animation
  dragonAnimTimer += dt;
  if(dragonAnimTimer >= DRAGON_ANIM_MS){
    dragonAnimTimer -= DRAGON_ANIM_MS;
    if(phase === PHASE.FLYING){
      dragonFrame = (dragonFrame + 1) % 5;
      dragonEl.src = flyFrames[dragonFrame].src;
    }
  }

  // Multiplier + dragon position during flight
  if(phase === PHASE.FLYING){
    tickAccum += dt;
    while(tickAccum >= 100){
      tickAccum -= 100;
      // Same exp curve: ~0.6%/100ms growth, slow ramp early, fast late
      multiplier *= Math.exp(0.006);

      // Auto-cashout check
      if(betPlaced && !cashedOut){
        const acVal = parseFloat(acInput.value);
        if(!isNaN(acVal) && acVal > 1 && multiplier >= acVal){ cashOut(); }
      }

      if(multiplier >= crashPoint){
        triggerCrash();
        break;
      }
    }
    multEl.textContent = multiplier.toFixed(2) + 'x';
    if(btnCashout.style.display !== 'none'){
      btnCashout.textContent = 'Cash Out ' + multiplier.toFixed(2) + 'x';
    }

    // Position: as multiplier grows, dragon moves right toward edge.
    // Compress the curve so the dragon reaches near-end at ~5x then hovers.
    const t = Math.min(1, Math.log(multiplier) / Math.log(8));
    dragonX = DRAGON_START_X + (DRAGON_END_X - DRAGON_START_X) * t;
    dragonY = DRAGON_Y_BASE - Math.sin(timestamp / 380) * 14;
  }

  // Harpoon flight + crash fall
  if(phase === PHASE.CRASHED){
    crashFallTime += dt;

    if(harpoonActive && !harpoonHit){
      harpoonProgress += dt / 320;        // 320ms to reach target
      if(harpoonProgress >= 1){
        harpoonProgress = 1;
        harpoonHit = true;
        harpoonEl.style.display = 'none';
        dragonEl.src = deadImg.src;
        dragonEl.classList.add('crashed');
        sndDead.currentTime = 0;
        sndDead.play().catch(()=>{});
      }
      const hx = harpoonStartX + (harpoonTargetX - harpoonStartX) * harpoonProgress;
      const hy = harpoonStartY + (harpoonTargetY - harpoonStartY) * harpoonProgress;
      const ang = Math.atan2(harpoonTargetY - harpoonStartY, harpoonTargetX - harpoonStartX);
      harpoonEl.style.left = hx + 'px';
      harpoonEl.style.top  = hy + 'px';
      harpoonEl.style.transform = 'rotate(' + (ang * 180 / Math.PI) + 'deg)';
    }

    if(harpoonHit){
      const fallElapsed = crashFallTime - 320;
      if(fallElapsed > 0){
        // Dragon rotates and falls
        dragonY += (fallElapsed * 0.0014) * dt;
        dragonRotation = Math.min(80, fallElapsed * 0.18);
      }
    }
  }

  // Render dragon transform
  dragonEl.style.left = dragonX + 'px';
  dragonEl.style.top  = dragonY + 'px';
  let scaleX = 1; // dragon faces right by default; if your sprite faces left, flip here
  dragonEl.style.transform = `scaleX(${scaleX}) rotate(${dragonRotation}deg)`;

  requestAnimationFrame(gameLoop);
}

/* ───────── KEYBOARD ───────── */
document.addEventListener('keydown', (e) => {
  if(document.activeElement === acInput) return;
  if(e.key === ' ' || e.key === 'Enter'){
    e.preventDefault();
    if(phase === PHASE.BETTING) placeBet();
    else if(phase === PHASE.FLYING) cashOut();
  }
  if(e.key === 'Backspace' || e.key === 'Delete'){
    e.preventDefault();
    clearBet();
  }
});

/* ───────── INIT ───────── */
updateBetDisplay();
updateBalanceDisplay();
startBetting();
requestAnimationFrame(gameLoop);
</script>
