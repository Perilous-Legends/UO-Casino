<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dragon Crash - HoH Casino</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cinzel+Decorative:wght@700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  width:100%;height:100%;overflow:hidden;
  background:#000;color:#f5e6c8;
  font-family:'Georgia',serif;
  user-select:none;
}

/* Full-bleed volcanic background */
#bg{
  position:fixed;inset:0;z-index:0;
  background:url('crash-assets/bg.jpg') center/cover no-repeat;
}
#bg-vignette{
  position:fixed;inset:0;z-index:1;pointer-events:none;
  background:radial-gradient(ellipse at 35% 50%, transparent 30%, rgba(0,0,0,0.55) 100%);
}

/* Game canvas occupies the LEFT 83% of the screen — sidebar takes the right 17%. */
#gameCanvas{
  position:fixed;
  left:0;top:0;
  width:83.1%;height:100%;
  z-index:2;
  display:block;
}

/* Multiplier readout — top-center over the canvas */
#mult-overlay{
  position:fixed;
  top:5%;left:41.5%;
  transform:translateX(-50%);
  font-family:'Cinzel Decorative',serif;
  font-size:74px;font-weight:900;
  color:#ffd700;
  text-shadow:
    0 0 22px rgba(255,200,80,0.7),
    0 0 44px rgba(255,140,40,0.5),
    0 4px 4px rgba(0,0,0,0.95);
  z-index:5;
  letter-spacing:3px;
  pointer-events:none;
}
#mult-overlay.crashed{
  color:#ff4040;
  text-shadow:
    0 0 24px rgba(255,60,60,0.8),
    0 0 48px rgba(255,0,0,0.5),
    0 4px 4px rgba(0,0,0,0.95);
}

/* Phase label below multiplier */
#phase-label{
  position:fixed;
  top:13%;left:41.5%;
  transform:translateX(-50%);
  font-family:'Cinzel',serif;
  font-size:18px;letter-spacing:5px;
  color:#ffe9b3;text-shadow:0 0 8px rgba(0,0,0,0.95);
  z-index:5;text-transform:uppercase;pointer-events:none;opacity:0.85;
}

/* Cashout button — bottom-center over the canvas, uses cashout_button.svg */
#action-bar{
  position:fixed;
  bottom:6%;left:41.5%;
  transform:translateX(-50%);
  z-index:7;
  display:flex;align-items:center;gap:14px;
  width:480px;
}
.payout-readout{
  flex:1;min-width:0;
  background:rgba(0,0,0,0.75);
  border:1px solid #8b6914;
  border-radius:6px;
  padding:10px 14px;
  text-align:center;
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  min-height:72px;
}
.payout-mult{ font:bold 22px Georgia,serif; color:#fff; line-height:1; }
.payout-amt{  font:bold 15px Georgia,serif; color:#4ade80; line-height:1.2; margin-top:4px; }
#cashout-btn{
  width:210px;height:72px;padding:0;
  background:url('crash-assets/cashout_button.svg') center/contain no-repeat;
  border:none;cursor:pointer;
  color:transparent;font:0/0 a;
  display:none;
  filter:drop-shadow(0 0 14px rgba(255,200,80,0.5));
  transition:transform 0.08s, filter 0.15s;
}
#cashout-btn:hover{ transform:translateY(-1px); filter:drop-shadow(0 0 20px rgba(255,215,0,0.85)); }
#cashout-btn.active{ display:block; }

/* Right-side sidebar — fixed at 83.1% from left, full height */
#sidebar{
  position:fixed;
  left:83.1%;top:0;
  width:16.9%;height:100%;
  z-index:10;
  pointer-events:auto;
}
#sidebar-bg{
  position:absolute;inset:0;
  background:url('crash-assets/sidebar3.png') center/100% 100% no-repeat;
  pointer-events:none;
}
.sb-block{
  position:absolute;
  z-index:1;
}
.sb-label{
  font-family:'Cinzel Decorative',serif;
  font-size:11px;letter-spacing:3px;
  color:#ffd28a;text-transform:uppercase;
  text-align:center;
  text-shadow:0 0 6px rgba(0,0,0,0.9);
}
.sb-value{
  font-family:Georgia,serif;font-size:18px;font-weight:bold;
  color:#ffd700;text-align:center;
  text-shadow:0 0 8px rgba(0,0,0,0.95);
}

/* Sidebar layout — coordinates expressed as % of sidebar.
   These mirror the production HoH casino layout. */
#sb-balance     { top: 5.4%; left:30%; width:70%; }
#sb-currentbet  { top: 9.4%; left:30%; width:70%; }
#sb-history     { top:13.4%; left:23.3%; width:72%; height:5%; }
#sb-chips       { top:28.5%; left: 4%;  width:92%; }
#sb-betinput    { top:36.0%; left:10%;  width:80%; }
#sb-confirm     { top:34.1%; left:10%;  width:80%; }
#sb-autocashout { top:40.1%; left:10%;  width:80%; }
#sb-feed        { top:62.0%; left: 5%;  width:90%; height:34%; }

#balance-val,#bet-val{
  font-family:Georgia,serif;font-weight:bold;
  font-size:22px;color:#ffd700;
  text-shadow:0 0 8px rgba(0,0,0,0.9);
}
#bet-val{ color:#ffffff; }

#history-strip{
  display:flex;flex-wrap:wrap;gap:3px;justify-content:center;align-items:center;
  height:100%;
}
.h-item{
  font:bold 11px Georgia,serif; padding:1px 5px;
  border-radius:3px; background:rgba(0,0,0,0.55);
  border:1px solid rgba(255,215,0,0.18);
}
.h-item.red    { color:#ff6464; }
.h-item.yellow { color:#ffcc00; }
.h-item.green  { color:#5eff8a; }

.chips-row{
  display:flex;justify-content:center;align-items:center;gap:5px;flex-wrap:nowrap;
}
.chip-btn{
  width:42px;height:42px;border-radius:50%;
  border:2px solid rgba(255,200,80,0.4);
  cursor:pointer;background:none;padding:0;
  transition:transform 0.1s,border-color 0.15s,box-shadow 0.15s;
}
.chip-btn img{ width:100%;height:100%;border-radius:50%;display:block;pointer-events:none; }
.chip-btn:hover{
  transform:scale(1.12);
  border-color:rgba(255,215,0,0.7);
  box-shadow:0 0 10px rgba(255,200,80,0.5);
}
.chip-btn.selected{
  border-color:#ffd700;
  box-shadow:0 0 14px rgba(255,215,0,0.7);
}

.field-input{
  width:100%;padding:6px 8px;text-align:center;
  background:rgba(0,0,0,0.7);
  border:1px solid #8b6914;
  color:#ffd700;font:14px Georgia,serif;
  border-radius:4px;outline:none;
}
#confirm-btn{
  width:100%;padding:8px 0;text-align:center;cursor:pointer;
  background:transparent;
  border:1px solid #8b6914;
  color:#f7e7a8;font:bold 16px Georgia,serif;letter-spacing:2px;
  border-radius:4px;
  text-shadow:0 0 6px rgba(0,0,0,0.9);
}
#confirm-btn:hover:not(:disabled){
  background:rgba(255,215,0,0.12);
}
#confirm-btn:disabled{ opacity:0.4; cursor:not-allowed; }

#feed{
  height:100%;overflow-y:auto;
  font:11px Georgia,serif;color:#ccc;
  padding:0 2px;
}
#feed::-webkit-scrollbar{ width:4px; }
#feed::-webkit-scrollbar-thumb{ background:rgba(255,200,80,0.3); }
.feed-line{ padding:2px 0; border-bottom:1px solid rgba(139,105,20,0.25); }
.feed-line.win{ color:#5eff8a; }
.feed-line.lose{ color:#ff8080; opacity:0.7; }

/* Mute button */
#mute-btn{
  position:fixed;top:14px;right:0.5%;z-index:50;
  background:rgba(0,0,0,0.75);
  border:1px solid rgba(255,200,80,0.4);
  color:#ffd28a;font-size:18px;padding:5px 10px;
  border-radius:5px;cursor:pointer;
  font-family:Georgia,serif;
}

/* PL banner */
#pl-banner{
  position:fixed;top:0;left:0;right:0;z-index:9998;
  background:#a30000;color:#fff;text-align:center;padding:9px;
  font:14px sans-serif;display:none;
}

/* Result toast */
#result{
  position:fixed;top:30%;left:41.5%;
  transform:translateX(-50%);
  font-family:'Cinzel Decorative',serif;font-size:48px;font-weight:900;
  z-index:8;letter-spacing:5px;
  pointer-events:none;opacity:0;
  transition:opacity 0.25s;
  text-shadow:0 4px 4px rgba(0,0,0,0.95);
}
#result.show{ opacity:1; }
#result.win  { color:#5eff8a; text-shadow:0 0 22px rgba(94,255,138,0.8),0 4px 4px rgba(0,0,0,0.95); }
#result.lose { color:#ff4040; text-shadow:0 0 22px rgba(255,64,64,0.8),0 4px 4px rgba(0,0,0,0.95); }
</style>
</head>
<body>
<div id="pl-banner"></div>
<script src="pl-bridge.js?v=20260509b"></script>

<div id="bg"></div>
<div id="bg-vignette"></div>

<button id="mute-btn" onclick="toggleMute()" title="Toggle music">&#x1f50a;</button>
<audio id="sndFlying" loop src="crash-assets/sound_flying.mp3"></audio>
<audio id="sndHarpoon"     src="crash-assets/sound_harpoon.mp3"></audio>
<audio id="sndDeath"       src="crash-assets/sound_death.mp3"></audio>

<canvas id="gameCanvas" width="1280" height="800"></canvas>

<div id="mult-overlay">1.00x</div>
<div id="phase-label">Place Your Bets</div>
<div id="result"></div>

<div id="action-bar">
  <div class="payout-readout">
    <div class="payout-mult" id="payout-mult">1.00x</div>
    <div class="payout-amt"  id="payout-amt">+ 0g</div>
  </div>
  <button id="cashout-btn" onclick="cashOut()">Cash Out</button>
</div>

<aside id="sidebar">
  <div id="sidebar-bg"></div>

  <div id="sb-balance" class="sb-block">
    <div id="balance-val">…</div>
  </div>
  <div id="sb-currentbet" class="sb-block">
    <div id="bet-val">0</div>
  </div>
  <div id="sb-history" class="sb-block">
    <div id="history-strip"></div>
  </div>
  <div id="sb-chips" class="sb-block">
    <div class="chips-row">
      <button class="chip-btn" id="chip-100"   onclick="selectChip(100)"  ><img src="chip-100.png"   alt="100"></button>
      <button class="chip-btn" id="chip-500"   onclick="selectChip(500)"  ><img src="chip-500.png"   alt="500"></button>
      <button class="chip-btn" id="chip-1000"  onclick="selectChip(1000)" ><img src="chip-1000.png"  alt="1K"></button>
      <button class="chip-btn" id="chip-5000"  onclick="selectChip(5000)" ><img src="chip-5000.png"  alt="5K"></button>
      <button class="chip-btn" id="chip-10000" onclick="selectChip(10000)"><img src="chip-10000.png" alt="10K"></button>
    </div>
  </div>
  <div id="sb-betinput" class="sb-block">
    <input class="field-input" type="number" id="bet-input" min="0" step="100" value="0" />
  </div>
  <div id="sb-confirm" class="sb-block">
    <button id="confirm-btn" onclick="placeBet()">Confirm</button>
  </div>
  <div id="sb-autocashout" class="sb-block">
    <input class="field-input" type="text" id="auto-cashout" placeholder="auto cashout x" maxlength="6" />
  </div>
  <div id="sb-feed" class="sb-block">
    <div id="feed"></div>
  </div>
</aside>

<script>
/* ───────── PL BRIDGE ───────── */
let balance = 0;
let bridgeReady = false;
(async function(){
  const banner = document.getElementById('pl-banner');
  function showBanner(msg){ banner.textContent = msg; banner.style.display = 'block'; }
  if(!window.PL){ showBanner('PL bridge not loaded.'); return; }
  try{
    const info = await PL.init();
    balance = info.balance;
    bridgeReady = true;
    PL.onBalanceChanged((b)=>{ balance = b; renderBalance(); });
    renderBalance();
  }catch(e){
    showBanner('Casino offline: ' + (e && e.message || e) + ' — close this tab and buy in from a Casino Stone.');
  }
})();
async function plWager(amt){
  try{ await PL.wager('crash', amt); return true; }
  catch(e){
    const banner = document.getElementById('pl-banner');
    if(e instanceof PL.errors.PLInsufficientFunds){
      banner.textContent = 'Insufficient bank — bet rejected.';
      banner.style.display = 'block';
      setTimeout(()=>{ banner.style.display='none'; }, 2500);
    }
    return false;
  }
}
async function plSettle(amt){
  if(amt <= 0) return;
  try{ await PL.settle('crash', amt); }
  catch(e){ console.error('settle failed', e); }
}

/* ───────── STATE ───────── */
const PHASE = { BETTING:0, FLYING:1, CRASHED:2 };
let phase = PHASE.BETTING;
let currentBet = 0;
let selectedChip = null;
let multiplier = 1.0;
let crashPoint = 1.0;
let cashedOut = false;
let cashoutMult = 0;
let betPlaced = false;
let crashHistory = [];

/* Dragon — diagonal flight from lower-left to upper-right */
const FRAME_COUNT = 48;
const dragonFrames = [];
let dragonFramesLoaded = 0;
for(let i = 1; i <= FRAME_COUNT; i++){
  const img = new Image();
  img.onload = () => { dragonFramesLoaded++; };
  img.src = `crash-assets/dragon_locked/frame${String(i).padStart(2,'0')}.png`;
  dragonFrames.push(img);
}
let dragonFrameIdx = 0;
let dragonAnimTimer = 0;
const DRAGON_ANIM_MS = 70;

const bgImg = new Image(); bgImg.src = 'crash-assets/bg.jpg';
const platformImg = new Image(); platformImg.src = 'crash-assets/harpoon_platform.png';
const harpoonImg  = new Image(); harpoonImg.src  = 'crash-assets/harpoon_bolt.png';
const deadImg     = new Image(); deadImg.src     = 'crash-assets/dragon_dead.png';

/* Dragon position state.
   Logical canvas is 1280x800 (CSS scales it to viewport).
   Dragon flies from lower-left toward upper-right corner. */
const PLAY_W = 1280, PLAY_H = 800;
const DRAGON_DRAW_W = 600;
const DRAGON_DRAW_H = 515;
const DRAGON_START_X = -300;       // 200px further left so the body actually reads as starting at the screen edge
const DRAGON_START_Y = 540;
const DRAGON_END_X   = 400;        // ends mid-canvas; clear of the right-side platform
const DRAGON_END_Y   = 60;
let dragonX = DRAGON_START_X;
let dragonY = DRAGON_START_Y;
let dragonRotation = 0;
let dragonDead = false;

/* Harpoon platform draws on the RIGHT side of the canvas.
   Platform PNG is 500x1050. Drawn ~360 wide, anchored bottom-right. */
const PLAT_W = 360, PLAT_H = 756;
const PLAT_X = PLAY_W - PLAT_W - 30;     // ~890
const PLAT_Y = PLAY_H - PLAT_H + 110;    // sticks below bottom edge a touch
const HARPOONER_X = PLAT_X + 80;          // approximate harpooner figure on platform
const HARPOONER_Y = PLAT_Y + 70;

/* Harpoon-projectile state */
let harpoonActive = false;
let harpoonHit = false;
let harpoonProgress = 0;
let harpoonStartX = 0, harpoonStartY = 0;
let harpoonTargetX = 0, harpoonTargetY = 0;
let harpoonAngle = 0;
const HARPOON_DRAW_W = 180;
const HARPOON_DRAW_H = 92;

/* Crash fall */
let crashFallTime = 0;

/* ───────── DOM REFS ───────── */
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
const multEl = document.getElementById('mult-overlay');
const phaseEl= document.getElementById('phase-label');
const resultEl = document.getElementById('result');
const balanceEl = document.getElementById('balance-val');
const betValEl = document.getElementById('bet-val');
const betInputEl = document.getElementById('bet-input');
const confirmBtn = document.getElementById('confirm-btn');
const cashoutBtn = document.getElementById('cashout-btn');
const acInput  = document.getElementById('auto-cashout');
const payoutMultEl = document.getElementById('payout-mult');
const payoutAmtEl  = document.getElementById('payout-amt');
const histEl = document.getElementById('history-strip');
const feedEl = document.getElementById('feed');
const sndFlying  = document.getElementById('sndFlying');
const sndHarpoon = document.getElementById('sndHarpoon');
const sndDeath   = document.getElementById('sndDeath');
sndFlying.volume = 0.45;
sndHarpoon.volume = 0.7;
sndDeath.volume = 0.85;

/* ───────── AUDIO ───────── */
let _muted = false;
function toggleMute(){
  _muted = !_muted;
  sndFlying.muted = _muted;
  sndHarpoon.muted = _muted;
  sndDeath.muted = _muted;
  document.getElementById('mute-btn').innerHTML = _muted ? '&#x1f507;' : '&#x1f50a;';
}

/* ───────── CANVAS RESIZE ───────── */
function fitCanvas(){
  const w = window.innerWidth * 0.831;
  const h = window.innerHeight;
  canvas.style.width  = w + 'px';
  canvas.style.height = h + 'px';
  // Logical drawing size stays at 1280x800 — preserves layout coords.
  // We also rescale dragon font/positions accordingly via the CSS '#mult-overlay'.
}
window.addEventListener('resize', fitCanvas);
fitCanvas();

/* ───────── CHIP HANDLING ───────── */
function selectChip(val){
  if(phase !== PHASE.BETTING || betPlaced) return;
  selectedChip = val;
  document.querySelectorAll('.chip-btn').forEach(e => e.classList.remove('selected'));
  const el = document.getElementById('chip-' + val);
  if(el) el.classList.add('selected');
  const next = currentBet + val;
  if(next <= balance){
    currentBet = next;
    betInputEl.value = currentBet;
    renderBet();
  }
}
function renderBalance(){ balanceEl.textContent = balance.toLocaleString(); }
function renderBet(){
  betValEl.textContent = currentBet.toLocaleString();
}

/* ───────── BET / CASHOUT ───────── */
function placeBet(){
  if(phase !== PHASE.BETTING) return;
  const v = Math.max(0, Math.floor(parseFloat(betInputEl.value) || 0));
  if(v <= 0 || v > balance) return;
  currentBet = v;
  renderBet();
  betPlaced = true;
  confirmBtn.disabled = true;
  confirmBtn.textContent = 'Bet Locked';
  feedAppend('You bet ' + v.toLocaleString() + 'g', '');
}
async function cashOut(){
  if(phase !== PHASE.FLYING || cashedOut || !betPlaced) return;
  cashedOut = true;
  cashoutMult = multiplier;
  const winnings = Math.floor(currentBet * cashoutMult);
  await plSettle(winnings);
  resultEl.textContent = '+ ' + winnings.toLocaleString() + 'g';
  resultEl.className = 'show win';
  setTimeout(()=>{ resultEl.className = ''; }, 2400);
  feedAppend('Cashed out at ' + cashoutMult.toFixed(2) + 'x → +' + winnings.toLocaleString() + 'g', 'win');
  cashoutBtn.classList.remove('active');
  payoutAmtEl.textContent = '+ ' + winnings.toLocaleString() + 'g';
}

/* ───────── HISTORY / FEED ───────── */
function addHistory(val){
  crashHistory.unshift(val);
  if(crashHistory.length > 12) crashHistory.pop();
  histEl.innerHTML = crashHistory.map(v => {
    const cls = v < 2 ? 'red' : v < 5 ? 'yellow' : 'green';
    return `<span class="h-item ${cls}">${v.toFixed(2)}x</span>`;
  }).join('');
}
function feedAppend(text, cls){
  const line = document.createElement('div');
  line.className = 'feed-line ' + (cls||'');
  line.textContent = text;
  feedEl.insertBefore(line, feedEl.firstChild);
  while(feedEl.children.length > 30) feedEl.removeChild(feedEl.lastChild);
}

/* ───────── CRASH POINT (4% house edge) ───────── */
function generateCrashPoint(){
  let r = Math.random();
  let cp = -1 / Math.log(r) * 0.96;
  while(cp < 1.0){
    r = Math.random();
    cp = -1 / Math.log(r) * 0.96;
  }
  return cp;
}

/* ───────── PHASE TRANSITIONS ───────── */
let countdownInterval = null;
function startBetting(){
  phase = PHASE.BETTING;
  multiplier = 1.0;
  cashedOut = false;
  cashoutMult = 0;
  betPlaced = false;
  harpoonActive = false;
  harpoonHit = false;
  harpoonProgress = 0;
  crashFallTime = 0;
  dragonX = DRAGON_START_X;
  dragonY = DRAGON_START_Y;
  dragonRotation = 0;
  dragonDead = false;
  dragonFrameIdx = 0;

  multEl.textContent = '1.00x';
  multEl.classList.remove('crashed');
  resultEl.className = '';
  cashoutBtn.classList.remove('active');
  payoutMultEl.textContent = '1.00x';
  payoutAmtEl.textContent  = '+ 0g';

  confirmBtn.disabled = false;
  confirmBtn.textContent = 'Confirm';

  crashPoint = generateCrashPoint();

  let cd = 5;
  phaseEl.textContent = 'Starting in ' + cd + '...';
  if(countdownInterval) clearInterval(countdownInterval);
  countdownInterval = setInterval(() => {
    cd--;
    if(cd <= 0){
      clearInterval(countdownInterval);
      countdownInterval = null;
      startFlying();
    } else {
      phaseEl.textContent = 'Starting in ' + cd + '...';
    }
  }, 1000);
}

async function startFlying(){
  phase = PHASE.FLYING;
  phaseEl.textContent = '';
  if(betPlaced){
    const ok = await plWager(currentBet);
    if(!ok){ betPlaced = false; return; }
    cashoutBtn.classList.add('active');
  }
  sndFlying.currentTime = 0;
  sndFlying.play().catch(()=>{});
}

function triggerCrash(){
  phase = PHASE.CRASHED;
  multiplier = crashPoint;
  multEl.textContent = crashPoint.toFixed(2) + 'x';
  multEl.classList.add('crashed');
  phaseEl.textContent = 'Crashed';
  payoutMultEl.textContent = crashPoint.toFixed(2) + 'x';

  sndFlying.pause(); sndFlying.currentTime = 0;

  // Launch harpoon from harpooner's position toward dragon
  harpoonActive = true;
  harpoonHit = false;
  harpoonProgress = 0;
  harpoonStartX  = HARPOONER_X;
  harpoonStartY  = HARPOONER_Y;
  harpoonTargetX = dragonX + DRAGON_DRAW_W * 0.5;
  harpoonTargetY = dragonY + DRAGON_DRAW_H * 0.5;
  harpoonAngle = Math.atan2(harpoonTargetY - harpoonStartY, harpoonTargetX - harpoonStartX);
  sndHarpoon.currentTime = 0;
  sndHarpoon.play().catch(()=>{});

  cashoutBtn.classList.remove('active');

  if(betPlaced && !cashedOut){
    plSettle(0);
    resultEl.textContent = 'Busted at ' + crashPoint.toFixed(2) + 'x';
    resultEl.className = 'show lose';
    setTimeout(()=>{ resultEl.className = ''; }, 2400);
    feedAppend('Busted at ' + crashPoint.toFixed(2) + 'x', 'lose');
  }

  addHistory(crashPoint);

  setTimeout(() => {
    currentBet = 0;
    selectedChip = null;
    document.querySelectorAll('.chip-btn').forEach(e => e.classList.remove('selected'));
    betInputEl.value = 0;
    renderBet();
    startBetting();
  }, 4000);
}

/* ───────── RENDER LOOP ───────── */
let lastT = 0;
let tickAccum = 0;
function frame(t){
  const dt = lastT ? (t - lastT) : 16;
  lastT = t;

  // Dragon animation timer
  dragonAnimTimer += dt;
  if(dragonAnimTimer >= DRAGON_ANIM_MS){
    dragonAnimTimer -= DRAGON_ANIM_MS;
    if(phase === PHASE.FLYING){
      dragonFrameIdx = (dragonFrameIdx + 1) % FRAME_COUNT;
    }
  }

  // Multiplier ticks + dragon trajectory
  if(phase === PHASE.FLYING){
    tickAccum += dt;
    while(tickAccum >= 100){
      tickAccum -= 100;
      multiplier *= Math.exp(0.006);

      if(betPlaced && !cashedOut){
        const acVal = parseFloat(acInput.value);
        if(!isNaN(acVal) && acVal > 1 && multiplier >= acVal){ cashOut(); }
      }
      if(multiplier >= crashPoint){ triggerCrash(); break; }
    }
    multEl.textContent = multiplier.toFixed(2) + 'x';
    payoutMultEl.textContent = multiplier.toFixed(2) + 'x';
    if(betPlaced && !cashedOut){
      payoutAmtEl.textContent = '+ ' + Math.floor(currentBet * multiplier).toLocaleString() + 'g';
    }

    // Diagonal trajectory: log-curve eases the dragon to upper-right corner
    const tNorm = Math.min(1, Math.log(multiplier) / Math.log(8));
    dragonX = DRAGON_START_X + (DRAGON_END_X - DRAGON_START_X) * tNorm;
    dragonY = DRAGON_START_Y + (DRAGON_END_Y - DRAGON_START_Y) * tNorm;
    dragonY += Math.sin(t / 380) * 12;        // wing-bob
  }

  // Harpoon flight + dragon fall during crash
  if(phase === PHASE.CRASHED){
    crashFallTime += dt;
    if(harpoonActive && !harpoonHit){
      harpoonProgress += dt / 320;
      if(harpoonProgress >= 1){
        harpoonProgress = 1;
        harpoonHit = true;
        dragonDead = true;
        sndDeath.currentTime = 0;
        sndDeath.play().catch(()=>{});
      }
    }
    if(harpoonHit){
      const fallElapsed = crashFallTime - 320;
      if(fallElapsed > 0){
        dragonY += (fallElapsed * 0.0018) * dt;
        dragonRotation = Math.min(85, fallElapsed * 0.2);
      }
    }
  }

  // Render
  ctx.clearRect(0, 0, PLAY_W, PLAY_H);

  // Background draws via CSS — but we still need a transparent canvas. No-op here.

  // Harpoon platform on the right side
  if(platformImg.complete && platformImg.naturalWidth){
    ctx.drawImage(platformImg, PLAT_X, PLAT_Y, PLAT_W, PLAT_H);
  }

  // Dragon
  ctx.save();
  ctx.translate(dragonX + DRAGON_DRAW_W / 2, dragonY + DRAGON_DRAW_H / 2);
  if(dragonRotation) ctx.rotate(dragonRotation * Math.PI / 180);
  if(dragonDead && deadImg.complete && deadImg.naturalWidth){
    ctx.drawImage(deadImg, -DRAGON_DRAW_W / 2, -DRAGON_DRAW_H / 2, DRAGON_DRAW_W, DRAGON_DRAW_H);
  } else {
    const f = dragonFrames[dragonFrameIdx];
    if(f && f.complete && f.naturalWidth){
      ctx.drawImage(f, -DRAGON_DRAW_W / 2, -DRAGON_DRAW_H / 2, DRAGON_DRAW_W, DRAGON_DRAW_H);
    }
  }
  ctx.restore();

  // Harpoon projectile (if in flight)
  if(phase === PHASE.CRASHED && harpoonActive && !harpoonHit && harpoonImg.complete){
    const hx = harpoonStartX + (harpoonTargetX - harpoonStartX) * harpoonProgress;
    const hy = harpoonStartY + (harpoonTargetY - harpoonStartY) * harpoonProgress;
    ctx.save();
    ctx.translate(hx, hy);
    // Harpoon PNG points right by default; we want it pointing FROM platform to dragon.
    // The platform is on the right, the dragon is on the left → harpoon flies leftward,
    // so flip horizontally then rotate to angle.
    ctx.rotate(harpoonAngle + Math.PI);
    ctx.drawImage(harpoonImg, -HARPOON_DRAW_W / 2, -HARPOON_DRAW_H / 2, HARPOON_DRAW_W, HARPOON_DRAW_H);
    ctx.restore();
  }

  requestAnimationFrame(frame);
}

/* ───────── KEYBOARD ───────── */
document.addEventListener('keydown', (e) => {
  if(document.activeElement === acInput || document.activeElement === betInputEl) return;
  if(e.key === ' ' || e.key === 'Enter'){
    e.preventDefault();
    if(phase === PHASE.BETTING) placeBet();
    else if(phase === PHASE.FLYING) cashOut();
  }
});

/* ───────── INIT ───────── */
betInputEl.addEventListener('input', () => {
  const v = Math.max(0, Math.floor(parseFloat(betInputEl.value) || 0));
  currentBet = v;
  renderBet();
});
renderBalance();
renderBet();
startBetting();
requestAnimationFrame(frame);
</script>
</body>
</html>
