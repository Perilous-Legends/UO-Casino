<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dragon's Flight - HoH Casino</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:#0a0e1a;
  color:#ccc;
  font-family:'Courier New',monospace;
  display:flex;justify-content:center;align-items:center;
  min-height:100vh;
  overflow:hidden;
}
#game-wrap{
  width:800px;max-width:100vw;
  background:linear-gradient(180deg,#0a0e1a 0%,#111827 40%,#0d1117 100%);
  border:2px solid #ffd70066;
  border-radius:8px;
  box-shadow:0 0 30px rgba(255,215,0,0.15),inset 0 0 60px rgba(0,0,0,0.5);
  position:relative;
  overflow:hidden;
}
/* stone texture overlay */
#game-wrap::before{
  content:'';position:absolute;top:0;left:0;right:0;bottom:0;
  background:repeating-conic-gradient(rgba(255,255,255,0.01) 0% 25%,transparent 0% 50%) 0 0/40px 40px;
  pointer-events:none;z-index:0;
}
#game-wrap>*{position:relative;z-index:1;}

/* TOP BAR */
.top-bar{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 12px;
  background:rgba(15,20,35,0.95);
  border-bottom:1px solid #ffd70033;
}
.history{display:flex;gap:5px;flex-wrap:wrap;flex:1;}
.history-item{
  font-size:12px;font-weight:bold;padding:2px 7px;border-radius:4px;
  background:rgba(0,0,0,0.4);
}
.history-item.red{color:#ff3333;}
.history-item.yellow{color:#ffcc00;}
.history-item.green{color:#44ff88;}
.bal-display{
  font-family:'Cinzel',serif;color:#ffd700;font-size:14px;white-space:nowrap;margin-left:10px;
}
.bal-display strong{font-size:16px;}

/* CANVAS */
#flight-canvas{
  display:block;width:100%;height:380px;
  background:transparent;
}

/* MULTIPLIER OVERLAY */
#mult-overlay{
  position:absolute;top:80px;left:0;right:0;
  text-align:center;pointer-events:none;
  font-family:'Cinzel',serif;font-size:72px;font-weight:900;
  color:#ffd700;
  text-shadow:0 0 20px rgba(255,215,0,0.6),0 0 40px rgba(255,215,0,0.3);
  transition:color 0.1s;
  z-index:10;
}
#mult-overlay.crashed{
  color:#ff3333;
  text-shadow:0 0 20px rgba(255,0,0,0.6),0 0 40px rgba(255,0,0,0.3);
}

/* RESULT OVERLAY */
#result-overlay{
  position:absolute;top:180px;left:0;right:0;
  text-align:center;pointer-events:none;
  font-family:'Cinzel',serif;font-size:36px;font-weight:700;
  opacity:0;transition:opacity 0.3s;
  z-index:11;
}
#result-overlay.show{opacity:1;}
#result-overlay.win{color:#44ff88;text-shadow:0 0 15px rgba(68,255,136,0.5);}
#result-overlay.lose{color:#ff3333;text-shadow:0 0 15px rgba(255,51,51,0.5);}

/* PHASE LABEL */
#phase-label{
  position:absolute;top:50px;left:0;right:0;
  text-align:center;pointer-events:none;
  font-family:'Cinzel',serif;font-size:18px;
  color:#aaa;opacity:0.7;
  z-index:10;
}

/* BOTTOM PANEL */
.bottom-panel{
  background:rgba(15,20,35,0.95);
  border-top:1px solid #ffd70033;
  padding:10px 12px;
}
.chips-row{
  display:flex;justify-content:center;gap:6px;margin-bottom:8px;
}
.chip-btn{
  background:none;border:2px solid transparent;border-radius:50%;
  cursor:pointer;padding:2px;transition:all 0.15s;
  width:56px;height:56px;display:flex;align-items:center;justify-content:center;
}
.chip-btn img{width:48px;height:48px;border-radius:50%;pointer-events:none;}
.chip-btn:hover{transform:scale(1.1);border-color:#ffd70066;}
.chip-btn.selected{border-color:#ffd700;box-shadow:0 0 10px rgba(255,215,0,0.4);}

.controls-row{
  display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;
}
.bet-display{
  font-family:'Cinzel',serif;color:#ffd700;font-size:16px;min-width:120px;text-align:center;
}
.bet-display small{color:#aaa;font-size:11px;display:block;}

.auto-cashout-wrap{
  display:flex;flex-direction:column;align-items:center;gap:2px;
}
.auto-cashout-wrap label{font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:1px;}
.auto-cashout-wrap input{
  width:70px;text-align:center;
  background:rgba(0,0,0,0.5);border:1px solid #ffd70044;
  color:#ffd700;font-family:monospace;font-size:14px;
  padding:4px;border-radius:4px;outline:none;
}
.auto-cashout-wrap input:focus{border-color:#ffd700;}
#auto-label{font-size:10px;color:#888;height:14px;}

#btn-bet,#btn-cashout{
  font-family:'Cinzel',serif;font-size:16px;font-weight:700;
  padding:10px 28px;border:none;border-radius:6px;cursor:pointer;
  text-transform:uppercase;letter-spacing:1px;
  transition:all 0.15s;
}
#btn-bet{
  background:linear-gradient(180deg,#ffd700,#b8960f);color:#0a0e1a;
}
#btn-bet:hover:not(:disabled){transform:scale(1.05);box-shadow:0 0 15px rgba(255,215,0,0.4);}
#btn-bet:disabled{opacity:0.3;cursor:default;transform:none;}

#btn-cashout{
  background:linear-gradient(180deg,#44ff88,#22aa55);color:#0a0e1a;
  display:none;
}
#btn-cashout:hover:not(:disabled){transform:scale(1.05);}
#btn-cashout:disabled{opacity:0.3;cursor:default;transform:none;}
#btn-cashout.active{
  display:inline-block;
  animation:pulseGreen 0.8s ease-in-out infinite;
}
@keyframes pulseGreen{
  0%,100%{box-shadow:0 0 8px rgba(68,255,136,0.3);}
  50%{box-shadow:0 0 20px rgba(68,255,136,0.6);}
}

#btn-clear{
  background:rgba(255,50,50,0.2);border:1px solid #ff333366;
  color:#ff6666;font-size:12px;padding:6px 12px;border-radius:4px;cursor:pointer;
  font-family:monospace;
}
#btn-clear:hover{background:rgba(255,50,50,0.35);}

/* MUTE BTN */
#muteBtn{
  position:absolute;top:8px;right:10px;z-index:999;
  background:rgba(0,0,0,0.6);border:1px solid #4aff7a44;
  color:#ffd700;font-size:18px;padding:4px 9px;border-radius:6px;
  cursor:pointer;line-height:1;
}

/* SCREEN FLASH */
#screen-flash{
  position:absolute;top:0;left:0;right:0;bottom:0;
  background:rgba(255,0,0,0.3);opacity:0;pointer-events:none;
  transition:opacity 0.1s;z-index:20;
}
#screen-flash.flash{opacity:1;}
</style>
</head>
<body>
<div id="pl-banner" style="position:fixed;top:0;left:0;right:0;z-index:9998;background:#a30000;color:#fff;text-align:center;padding:9px;font-family:sans-serif;font-size:14px;display:none;"></div>
<script src="pl-bridge.js?v=20260508a"></script>
<div id="game-wrap">
  <button id="muteBtn" onclick="toggleMute()" title="Toggle music">&#x1f50a;</button>
  <audio id="bgMusic" loop src="./bg-music.mp3"></audio>
  <div id="screen-flash"></div>

  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="history" id="history"></div>
    <div class="bal-display">Bank: <strong id="balance">…</strong>g</div>
  </div>

  <!-- CANVAS AREA -->
  <div style="position:relative;">
    <canvas id="flight-canvas" width="800" height="380"></canvas>
    <div id="phase-label">PLACE YOUR BETS</div>
    <div id="mult-overlay">1.00x</div>
    <div id="result-overlay"></div>
  </div>

  <!-- BOTTOM PANEL -->
  <div class="bottom-panel">
    <div class="chips-row">
      <div class="chip-btn" id="chip-100" onclick="selectChip(100)"><img src="chip-100.png" alt="100"></div>
      <div class="chip-btn" id="chip-500" onclick="selectChip(500)"><img src="chip-500.png" alt="500"></div>
      <div class="chip-btn" id="chip-1000" onclick="selectChip(1000)"><img src="chip-1000.png" alt="1K"></div>
      <div class="chip-btn" id="chip-5000" onclick="selectChip(5000)"><img src="chip-5000.png" alt="5K"></div>
      <div class="chip-btn" id="chip-10000" onclick="selectChip(10000)"><img src="chip-10000.png" alt="10K"></div>
    </div>
    <div class="controls-row">
      <button id="btn-clear" onclick="clearBet()">CLR</button>
      <div class="bet-display">
        <small>BET</small>
        <span id="bet-amount">0</span>g
      </div>
      <div class="auto-cashout-wrap">
        <label>Auto Cashout</label>
        <input type="text" id="auto-cashout" value="2.00" maxlength="6">
        <span id="auto-label"></span>
      </div>
      <button id="btn-bet" onclick="placeBet()">BET</button>
      <button id="btn-cashout" onclick="cashOut()">CASH OUT</button>
    </div>
  </div>
</div>

<script>
/* ── GLOBALS ── */
let balance = 0;
// PL bridge bootstrap — must run before placeBet/cashOut.
(async function(){
  const banner = document.getElementById('pl-banner');
  function showBanner(msg){ banner.textContent = msg; banner.style.display = 'block'; }
  try {
    const info = await PL.init();
    balance = info.balance;
    PL.onBalanceChanged((b)=>{ balance = b; if (typeof updateBalanceDisplay === 'function') updateBalanceDisplay(); });
    if (typeof updateBalanceDisplay === 'function') updateBalanceDisplay();
  } catch (e) {
    showBanner('Casino offline: ' + (e && e.message || e) + ' — close this tab and buy in from a Casino Stone.');
  }
})();
async function plWagerCrash(amount){
  try { await PL.wager('crash', amount); return true; }
  catch (e) {
    const banner = document.getElementById('pl-banner');
    if (e instanceof PL.errors.PLInsufficientFunds) {
      banner.textContent = 'Insufficient bank — bet rejected.';
      banner.style.display = 'block';
      setTimeout(()=>{ banner.style.display='none'; }, 2500);
    }
    return false;
  }
}
async function plSettleCrash(amount){
  if (amount <= 0) return;
  try { await PL.settle('crash', amount); }
  catch (e) { console.error('crash settle failed', e); }
}
let currentBet = 0;
let selectedChip = null;
let crashHistory = [];

const PHASE = { BETTING: 0, FLYING: 1, CRASHED: 2 };
let phase = PHASE.BETTING;
let tick = 0;
let multiplier = 1.0;
let crashPoint = 1.0;
let cashedOut = false;
let cashoutMult = 0;
let bettingTimer = 0;
let betPlaced = false;

/* ── DOM REFS ── */
const canvas = document.getElementById('flight-canvas');
const ctx = canvas.getContext('2d');
const multOverlay = document.getElementById('mult-overlay');
const resultOverlay = document.getElementById('result-overlay');
const phaseLabel = document.getElementById('phase-label');
const balanceEl = document.getElementById('balance');
const betAmountEl = document.getElementById('bet-amount');
const btnBet = document.getElementById('btn-bet');
const btnCashout = document.getElementById('btn-cashout');
const autoCashoutInput = document.getElementById('auto-cashout');
const autoLabel = document.getElementById('auto-label');
const historyEl = document.getElementById('history');
const screenFlash = document.getElementById('screen-flash');

/* ── AUDIO ── */
const bgMusic = document.getElementById('bgMusic');
bgMusic.volume = 0.45;
let _muted = false;
function toggleMute(){
  _muted = !_muted;
  bgMusic.muted = _muted;
  document.getElementById('muteBtn').innerHTML = _muted ? '&#x1f507;' : '&#x1f50a;';
}
function startMusic(){ bgMusic.play().catch(()=>{}); }
document.addEventListener('pointerdown', startMusic, {once:true});
document.addEventListener('keydown', startMusic, {once:true});

/* ── DRAGON SPRITES ── */
const flyFrames = [];
let crashImg = new Image();
crashImg.src = 'sprites/dragon/fly/dragon_crash.png';
for(let i = 0; i < 5; i++){
  const img = new Image();
  img.src = `sprites/dragon/fly/dragon_fly_0${i}.png`;
  flyFrames.push(img);
}
let dragonFrame = 0;
let dragonAnimTimer = 0;
const DRAGON_ANIM_MS = 120;

/* ── PARTICLES ── */
let particles = [];
function spawnParticles(count, type){
  for(let i = 0; i < count; i++){
    if(type === 'ember'){
      particles.push({
        x: Math.random() * 800,
        y: 380 + Math.random() * 40,
        vx: (Math.random() - 0.5) * 0.3,
        vy: -(0.3 + Math.random() * 0.6),
        life: 200 + Math.random() * 300,
        maxLife: 0,
        size: 1.5 + Math.random() * 2.5,
        color: Math.random() > 0.5 ? '#ffd700' : '#ff9900',
        type: 'ember'
      });
      particles[particles.length-1].maxLife = particles[particles.length-1].life;
    } else if(type === 'crash'){
      const angle = Math.random() * Math.PI * 2;
      const speed = 2 + Math.random() * 4;
      particles.push({
        x: 400, y: 190,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 40 + Math.random() * 30,
        maxLife: 0,
        size: 2 + Math.random() * 3,
        color: '#ff3333',
        type: 'crash'
      });
      particles[particles.length-1].maxLife = particles[particles.length-1].life;
    }
  }
}
// Initial embers
spawnParticles(40, 'ember');

function updateParticles(dt){
  const speedMult = multiplier > 5 ? 2.0 : 1.0;
  for(let i = particles.length - 1; i >= 0; i--){
    const p = particles[i];
    p.x += p.vx * speedMult;
    p.y += p.vy * speedMult;
    p.life--;
    if(p.life <= 0){
      particles.splice(i, 1);
      // Respawn embers
      if(p.type === 'ember') spawnParticles(1, 'ember');
    }
  }
  // Add more embers when multiplier > 5
  if(phase === PHASE.FLYING && multiplier > 5 && particles.filter(p=>p.type==='ember').length < 70){
    spawnParticles(2, 'ember');
  }
}

function drawParticles(){
  for(const p of particles){
    const alpha = Math.min(1, p.life / (p.maxLife * 0.3));
    ctx.globalAlpha = alpha * 0.7;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

/* ── BEZIER PATH ── */
const PATH_START = {x: 80, y: 320};
const PATH_CTRL = {x: 200, y: 50};
const PATH_END = {x: 520, y: 80};

function bezierPoint(t){
  const u = 1 - t;
  return {
    x: u*u*PATH_START.x + 2*u*t*PATH_CTRL.x + t*t*PATH_END.x,
    y: u*u*PATH_START.y + 2*u*t*PATH_CTRL.y + t*t*PATH_END.y
  };
}

/* ── CRASH POINT GENERATION ── */
function generateCrashPoint(){
  // House edge 4%
  let r = Math.random();
  let cp = -1 / Math.log(r) * 0.96;
  while(cp < 1.0){
    r = Math.random();
    cp = -1 / Math.log(r) * 0.96;
  }
  return cp;
}

/* ── CHIP SELECTION ── */
function selectChip(val){
  selectedChip = val;
  document.querySelectorAll('.chip-btn').forEach(e => e.classList.remove('selected'));
  const el = document.getElementById('chip-' + val);
  if(el) el.classList.add('selected');
  addToBet();
}

function addToBet(){
  if(phase !== PHASE.BETTING || !selectedChip) return;
  if(currentBet + selectedChip > balance) return;
  currentBet += selectedChip;
  updateBetDisplay();
}

function clearBet(){
  if(phase !== PHASE.BETTING) return;
  currentBet = 0;
  selectedChip = null;
  document.querySelectorAll('.chip-btn').forEach(e => e.classList.remove('selected'));
  updateBetDisplay();
}

function updateBetDisplay(){
  betAmountEl.textContent = currentBet.toLocaleString();
}

function updateBalanceDisplay(){
  balanceEl.textContent = balance.toLocaleString();
}

/* ── BET / CASHOUT ── */
function placeBet(){
  if(phase !== PHASE.BETTING || currentBet <= 0) return;
  betPlaced = true;
  btnBet.disabled = true;
  // Update auto label
  const acVal = parseFloat(autoCashoutInput.value);
  if(!isNaN(acVal) && acVal > 1){
    autoLabel.textContent = `AUTO CASHOUT at ${acVal.toFixed(2)}x`;
  } else {
    autoLabel.textContent = '';
  }
}

async function cashOut(){
  if(phase !== PHASE.FLYING || cashedOut || !betPlaced) return;
  cashedOut = true;
  cashoutMult = multiplier;
  const winnings = Math.floor(currentBet * cashoutMult);
  await plSettleCrash(winnings);
  showResult(true, winnings - currentBet);
  btnCashout.classList.remove('active');
  btnCashout.disabled = true;
}

/* ── HISTORY ── */
function addHistory(val){
  crashHistory.unshift(val);
  if(crashHistory.length > 10) crashHistory.pop();
  renderHistory();
}

function renderHistory(){
  historyEl.innerHTML = '';
  for(const v of crashHistory){
    const cls = v < 2 ? 'red' : v < 5 ? 'yellow' : 'green';
    historyEl.innerHTML += `<span class="history-item ${cls}">${v.toFixed(2)}x</span>`;
  }
}

/* ── RESULT OVERLAY ── */
function showResult(win, amount){
  resultOverlay.className = 'show ' + (win ? 'win' : 'lose');
  if(win){
    resultOverlay.textContent = `WIN: +${amount.toLocaleString()}g`;
  } else {
    resultOverlay.textContent = 'BUST';
  }
}

function hideResult(){
  resultOverlay.className = '';
  resultOverlay.textContent = '';
}

/* ── DRAW FLIGHT PATH ── */
function drawFlightPath(){
  // Draw faint trail
  ctx.strokeStyle = 'rgba(255,215,0,0.15)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(PATH_START.x, PATH_START.y);
  ctx.quadraticCurveTo(PATH_CTRL.x, PATH_CTRL.y, PATH_END.x, PATH_END.y);
  ctx.stroke();

  // Draw traveled path (gold)
  if(phase === PHASE.FLYING || phase === PHASE.CRASHED){
    const t = Math.min(1, Math.max(0, (multiplier - 1) / 9));
    ctx.strokeStyle = 'rgba(255,215,0,0.5)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(PATH_START.x, PATH_START.y);
    // Draw path up to current t
    const steps = Math.floor(t * 50);
    for(let i = 1; i <= steps; i++){
      const st = i / 50;
      const pt = bezierPoint(st);
      ctx.lineTo(pt.x, pt.y);
    }
    ctx.stroke();
  }
}

/* ── DRAW DRAGON ── */
let dragonShakeX = 0, dragonShakeY = 0, dragonFallY = 0;

function drawDragon(){
  let t, img;
  if(phase === PHASE.BETTING){
    t = 0;
    img = flyFrames[0];
  } else if(phase === PHASE.FLYING){
    t = Math.min(1, Math.max(0, (multiplier - 1) / 9));
    img = flyFrames[dragonFrame];
  } else {
    t = Math.min(1, Math.max(0, (crashPoint - 1) / 9));
    img = crashImg;
  }

  const pos = bezierPoint(t);
  const drawX = pos.x - 50 + dragonShakeX;
  const drawY = pos.y - 40 + dragonShakeY + dragonFallY;

  if(img && img.complete && img.naturalWidth > 0){
    ctx.drawImage(img, drawX, drawY, 100, 80);
  } else {
    // Fallback rectangle
    ctx.fillStyle = '#ffd700';
    ctx.fillRect(drawX, drawY, 100, 80);
  }
}

/* ── GAME LOOP ── */
let lastTime = 0;
let tickAccum = 0;
let crashAnimTime = 0;

function gameLoop(timestamp){
  const dt = lastTime ? (timestamp - lastTime) : 16;
  lastTime = timestamp;

  // Dragon animation
  dragonAnimTimer += dt;
  if(dragonAnimTimer >= DRAGON_ANIM_MS){
    dragonAnimTimer -= DRAGON_ANIM_MS;
    if(phase === PHASE.FLYING){
      dragonFrame = (dragonFrame + 1) % 5;
    }
  }

  // Multiplier tick
  if(phase === PHASE.FLYING){
    tickAccum += dt;
    while(tickAccum >= 100){
      tickAccum -= 100;
      tick++;
      multiplier = Math.exp(0.00006 * tick);

      // Check auto-cashout
      if(betPlaced && !cashedOut){
        const acVal = parseFloat(autoCashoutInput.value);
        if(!isNaN(acVal) && acVal > 1 && multiplier >= acVal){
          cashOut();
        }
      }

      // Check crash
      if(multiplier >= crashPoint){
        triggerCrash();
        break;
      }
    }
    // Update multiplier display
    if(phase === PHASE.FLYING){
      multOverlay.textContent = multiplier.toFixed(2) + 'x';
      btnCashout.textContent = `CASH OUT ${multiplier.toFixed(2)}x`;
    }
  }

  // Crash animation
  if(phase === PHASE.CRASHED){
    crashAnimTime += dt;
    if(crashAnimTime < 500){
      dragonShakeX = (Math.random() - 0.5) * 10;
      dragonShakeY = (Math.random() - 0.5) * 10;
      dragonFallY = crashAnimTime * 0.15;
    }
    if(crashAnimTime > 300){
      screenFlash.classList.remove('flash');
    }
  }

  // Draw
  ctx.clearRect(0, 0, 800, 380);
  drawParticles();
  updateParticles(dt);
  drawFlightPath();
  drawDragon();

  requestAnimationFrame(gameLoop);
}

/* ── PHASE TRANSITIONS ── */
function startBetting(){
  phase = PHASE.BETTING;
  tick = 0;
  tickAccum = 0;
  multiplier = 1.0;
  cashedOut = false;
  cashoutMult = 0;
  betPlaced = false;
  dragonShakeX = 0;
  dragonShakeY = 0;
  dragonFallY = 0;
  crashAnimTime = 0;
  dragonFrame = 0;

  multOverlay.textContent = '1.00x';
  multOverlay.classList.remove('crashed');
  hideResult();
  phaseLabel.textContent = 'PLACE YOUR BETS';
  phaseLabel.style.opacity = '0.7';

  btnBet.style.display = 'inline-block';
  btnBet.disabled = false;
  btnCashout.style.display = 'none';
  btnCashout.classList.remove('active');

  crashPoint = generateCrashPoint();

  // Countdown
  let countdown = 3;
  phaseLabel.textContent = `STARTING IN ${countdown}...`;
  const cdInterval = setInterval(() => {
    countdown--;
    if(countdown <= 0){
      clearInterval(cdInterval);
      startFlying();
    } else {
      phaseLabel.textContent = `STARTING IN ${countdown}...`;
    }
  }, 1000);
}

async function startFlying(){
  phase = PHASE.FLYING;
  phaseLabel.textContent = '';
  phaseLabel.style.opacity = '0';

  btnBet.style.display = 'none';

  if(betPlaced){
    // Place the wager with the server now that the round is starting.
    // If the server rejects (e.g. insufficient funds — should not happen
    // because we checked at placeBet, but races are possible), abort
    // this round's bet.
    const ok = await plWagerCrash(currentBet);
    if (!ok) {
      betPlaced = false;
      return;
    }
    btnCashout.style.display = 'inline-block';
    btnCashout.classList.add('active');
    btnCashout.disabled = false;
    btnCashout.textContent = 'CASH OUT 1.00x';
  }
}

function triggerCrash(){
  phase = PHASE.CRASHED;
  multiplier = crashPoint;
  crashAnimTime = 0;

  multOverlay.textContent = crashPoint.toFixed(2) + 'x';
  multOverlay.classList.add('crashed');
  phaseLabel.textContent = 'CRASHED!';
  phaseLabel.style.opacity = '0.7';

  screenFlash.classList.add('flash');

  btnCashout.classList.remove('active');
  btnCashout.style.display = 'none';

  // Crash particles
  spawnParticles(30, 'crash');

  // If player didn't cash out — settle as a loss (server credits 0).
  if(betPlaced && !cashedOut){
    plSettleCrash(0);
    showResult(false, 0);
  }

  addHistory(crashPoint);

  // Reset bet for next round
  setTimeout(() => {
    currentBet = 0;
    updateBetDisplay();
    startBetting();
  }, 3000);
}

/* ── KEYBOARD ── */
document.addEventListener('keydown', (e) => {
  if(e.key === 'Delete' || e.key === 'Backspace'){
    if(document.activeElement === autoCashoutInput) return;
    e.preventDefault();
    clearBet();
  }
  if(e.key === ' ' || e.key === 'Enter'){
    if(document.activeElement === autoCashoutInput) return;
    e.preventDefault();
    if(phase === PHASE.BETTING) placeBet();
    else if(phase === PHASE.FLYING) cashOut();
  }
});

/* ── INIT ── */
updateBetDisplay();
updateBalanceDisplay();
startBetting();
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
