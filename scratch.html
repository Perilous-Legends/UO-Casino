<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lucky Scratch - HoH Casino</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a0a00;
      color: #ffd700;
      font-family: Georgia, serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
      user-select: none;
    }

    .hud {
      display: flex;
      gap: 24px;
      align-items: center;
      background: rgba(0,0,0,0.6);
      border: 1px solid #c9a84c44;
      border-radius: 8px;
      padding: 8px 20px;
      margin-bottom: 0;
      font-size: 13px;
    }
    .hud-item { display: flex; flex-direction: column; align-items: center; gap: 1px; }
    .hud-label { font-size: 9px; color: #888; letter-spacing: 1px; }
    .hud-value { font-size: 16px; color: #ffd700; font-weight: bold; }
    .hud-value.green { color: #00ff88; }
    .hud-value.red   { color: #ff4444; }

    /* Ticket wrapper - sized to image */
    #ticket-wrap {
      position: relative;
      display: inline-block;
      line-height: 0;
      margin-top: 60px;
    }

    #bg-img {
      display: block;
      max-width: 100%;
      max-height: 80vh;
      width: auto;
      height: auto;
    }

    /* Scratch cells overlay - absolute, covers image exactly */
    #scratch-layer {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; /* cells handle their own events */
    }

    /* Each scratch cell */
    .scratch-cell {
      position: absolute;
      overflow: hidden;
      cursor: url('scratch-cursor-64.png') 32 32, crosshair;
      pointer-events: all;
      container-type: inline-size;
    }

    .scratch-cell canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1;
    }

    .cell-prize-display {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 0;
      background: #0d0600;
      overflow: hidden;
    }

    .prize-pct-text {
      font-family: Georgia, serif;
      font-weight: bold;
      line-height: 1;
      white-space: nowrap;
      /* size set dynamically by fitPrizeText() */
    }

    /* DEBUG MODE */
    .debug-box {
      position: absolute;
      border: 2px solid #00ff00;
      background: rgba(0,255,0,0.15);
      cursor: move;
      pointer-events: all;
      z-index: 100;
    }
    .debug-box.active-drag { border-color: #ffff00; background: rgba(255,255,0,0.2); }

    .debug-label {
      position: absolute;
      top: 2px; left: 4px;
      font-size: 9px;
      color: #00ff00;
      font-family: monospace;
      white-space: nowrap;
      pointer-events: none;
    }

    /* Resize handle - bottom-right corner */
    .resize-handle {
      position: absolute;
      bottom: 0; right: 0;
      width: 12px; height: 12px;
      background: #00ff00;
      cursor: nwse-resize;
      pointer-events: all;
    }

    /* Debug panel */
    #debug-panel {
      position: fixed;
      top: 8px; right: 8px;
      width: 280px;
      background: rgba(0,0,0,0.92);
      border: 2px solid #00ff00;
      border-radius: 8px;
      padding: 10px;
      font-family: monospace;
      font-size: 10px;
      color: #00ff00;
      z-index: 200;
      display: none;
    }

    #debug-panel h3 {
      font-size: 11px;
      color: #ffff00;
      margin-bottom: 8px;
      letter-spacing: 2px;
    }

    #debug-coords {
      line-height: 1.8;
      margin-bottom: 10px;
      white-space: pre;
    }

    .dbtn {
      display: inline-block;
      padding: 5px 10px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-family: monospace;
      font-size: 10px;
      font-weight: bold;
      margin: 2px;
    }
    .dbtn-copy { background: #00ff00; color: #000; }
    .dbtn-toggle { background: #ffff00; color: #000; }
    .dbtn-done { background: #ff6600; color: #000; }

    /* Bottom bar */
    #top-bar {
      display: flex;
      gap: 16px;
      align-items: center;
      justify-content: center;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    #bottom-bar {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }
    #bottom-bar.pos-debug, #chip-bar.pos-debug {
      position: fixed;
      cursor: grab;
      z-index: 8500;
      outline: 2px dashed #00ffff;
      outline-offset: 4px;
    }
    #bottom-bar.pos-debug:active, #chip-bar.pos-debug:active { cursor: grabbing; }

    /* Chip selector */
    #chip-bar {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: center;
    }
    .chip-btn {
      background: none;
      border: 3px solid transparent;
      border-radius: 50%;
      padding: 0;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s;
      width: 47px; height: 47px;
    }
    .chip-btn img { width: 100%; height: 100%; border-radius: 50%; display: block; }
    .chip-btn:hover { transform: scale(1.1); }
    .chip-btn.selected { border-color: #ffd700; transform: scale(1.15); box-shadow: 0 0 16px #ffd70088; }
    .chip-btn.debug-drag { position:fixed; cursor:grab; z-index:8500; border-color:#00ffff !important; box-shadow: 0 0 12px #00ffff88 !important; }
    .chip-btn.debug-drag:active { cursor:grabbing; }
    #bet-display {
      font-size: 13px; color: #ffd700; text-align: center; margin-top: 6px; letter-spacing: 1px;
    }

    /* Chip debugger HUD */
    #chip-debug-hud {
      display:none; position:fixed; bottom:12px; left:50%; transform:translateX(-50%);
      background:rgba(0,0,0,0.9); border:1px solid #00ffff88; border-radius:8px;
      padding:10px 18px; color:#00ffff; font-size:13px; z-index:8600;
      font-family:monospace; gap:10px; align-items:center; flex-wrap:wrap; justify-content:center;
      max-width:600px;
    }
    #chip-debug-hud.open { display:flex; }
    .chip-dbtn {
      background:#00ffff; color:#000; border:none; border-radius:5px;
      padding:3px 10px; font-size:12px; font-weight:bold; cursor:pointer; margin-left:4px;
    }
    .chip-dbtn.done { background:#ff4444; color:#fff; }

    .btn {
      padding: 10px 22px;
      border: none;
      border-radius: 8px;
      font-family: Georgia, serif;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all 0.2s;
    }
    .btn-buy    { background: linear-gradient(135deg,#c9a84c,#ffd700); color:#1a0a00; }
    .btn-buy:hover { transform:scale(1.04); box-shadow:0 0 14px #ffd70066; }
    .btn-buy:disabled { background:#444; color:#888; cursor:not-allowed; transform:none; }
    .btn-reveal { background:rgba(255,255,255,0.08); color:#ffd700; border:1px solid #c9a84c44; }
    .btn-reveal:disabled { opacity:0.3; cursor:not-allowed; }
    .btn-paytable { background:rgba(180,140,40,0.2); color:#ffd700; border:1px solid #c9a84c88; }
    .btn-paytable:hover { background:rgba(180,140,40,0.35); }

    /* Pay Table Modal */
    #paytable-modal {
      display:none; position:fixed; inset:0; z-index:9999;
      background:rgba(0,0,0,0.82); backdrop-filter:blur(4px);
      align-items:center; justify-content:center;
    }
    #paytable-modal.open { display:flex; }
    #paytable-inner {
      background: linear-gradient(160deg,#1a0f00,#2a1800);
      border:2px solid #c9a84c88; border-radius:14px;
      padding:28px 32px; min-width:320px; max-width:420px; width:90%;
      box-shadow:0 0 40px #c9a84c44;
      font-family: inherit;
    }
    #paytable-inner h2 {
      text-align:center; color:#ffd700; margin:0 0 18px 0;
      font-size:20px; letter-spacing:3px; text-transform:uppercase;
    }
    .pt-row {
      display:flex; justify-content:space-between; align-items:center;
      padding:7px 10px; border-radius:6px; margin-bottom:4px;
      font-size:15px;
    }
    .pt-row:nth-child(odd) { background:rgba(255,255,255,0.04); }
    .pt-prize { font-weight:bold; }
    .pt-odds  { color:#aaa; font-size:13px; }
    .pt-close {
      display:block; margin:20px auto 0;
      background:linear-gradient(135deg,#c9a84c,#ffd700);
      color:#1a0a00; border:none; border-radius:8px;
      padding:9px 32px; font-size:15px; font-weight:bold;
      cursor:pointer; letter-spacing:1px;
    }
    .pt-close:hover { transform:scale(1.04); }

    .result-banner {
      text-align:center; padding:8px 20px; border-radius:8px;
      font-size:16px; font-weight:bold; letter-spacing:2px;
      min-width: 220px;
    }
    .result-banner.draggable-mode {
      position:fixed; cursor:grab; z-index:8000;
      border:2px dashed #ffd700 !important; user-select:none;
    }
    .result-banner.draggable-mode:active { cursor:grabbing; }
    #banner-debug-hud {
      display:none; position:fixed; bottom:12px; left:50%; transform:translateX(-50%);
      background:rgba(0,0,0,0.85); border:1px solid #ffd70088; border-radius:8px;
      padding:8px 16px; color:#ffd700; font-size:13px; z-index:8001;
      font-family:monospace; display:none; align-items:center; gap:12px;
    }
    #banner-debug-hud.open { display:flex; }
    #banner-copy-btn {
      background:#ffd700; color:#1a0a00; border:none; border-radius:5px;
      padding:3px 10px; font-size:12px; font-weight:bold; cursor:pointer;
    }
    .result-banner.idle { border:1px solid #c9a84c22; color:#ffffff; font-size:11px; }
    .result-banner.win  { background:rgba(0,255,100,0.15); border:1px solid #00ff88; color:#00ff88; }
    .result-banner.lose { background:rgba(255,50,50,0.1);  border:1px solid #ff444488; color:#ff6666; }

    @keyframes floatUp {
      0%   { transform:translateY(0) scale(1); opacity:1; }
      100% { transform:translateY(-80px) scale(1.4); opacity:0; }
    }
    .particle { position:fixed; pointer-events:none; font-size:20px; animation:floatUp 1.2s ease-out forwards; z-index:999; }

    /* Fireworks */
    @keyframes fwExplode {
      0%   { transform:translate(0,0) scale(0.2); opacity:1; }
      80%  { opacity:1; }
      100% { transform:translate(var(--fx), var(--fy)) scale(1); opacity:0; }
    }
    @keyframes fwTrail {
      0%   { transform:translateY(0); opacity:1; }
      100% { transform:translateY(var(--trail-dist)); opacity:0; }
    }
    .fw-dot {
      position:fixed; pointer-events:none; border-radius:50%;
      width:6px; height:6px;
      animation: fwExplode 0.9s ease-out forwards;
      z-index:9998;
    }
    #fireworks-canvas {
      position:fixed; inset:0; pointer-events:none; z-index:9997;
    }

    @keyframes pulse {
      0%,100% { box-shadow: inset 0 0 10px #ffd70066; }
      50%      { box-shadow: inset 0 0 22px #ffd700cc; }
    }
    .winner-glow { animation: pulse 0.8s ease-in-out infinite; }
  </style>
</head>
<body>
<div id="pl-banner" style="position:fixed;top:0;left:0;right:0;z-index:9998;background:#a30000;color:#fff;text-align:center;padding:9px;font-family:sans-serif;font-size:14px;display:none;"></div>
<script src="pl-bridge.js?v=20260507a"></script>

<div id="elem-debug-hud" style="display:none;position:fixed;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.92);border:1px solid #00ffff88;border-radius:8px;padding:10px 18px;color:#00ffff;font-size:13px;z-index:8600;font-family:monospace;display:none;gap:12px;align-items:center;flex-wrap:wrap;justify-content:center;max-width:700px;">
  <span id="elem-debug-coords">Drag buttons or chips to reposition</span>
  <button class="chip-dbtn" onclick="copyElemCoords()">COPY ALL</button>

</div>

<div id="top-bar" style="position:fixed; left:756px; top:16px; margin:0;">
  <button class="btn btn-paytable" onclick="openPayTable()">📋 Pay Table</button>
  <div class="hud" id="hud-bar">
    <div class="hud-item">
      <div class="hud-label">BALANCE</div>

    </div>
    <div class="hud-item">
      <div class="hud-label">BET</div>

    </div>
    <div class="hud-item">
      <div class="hud-label">LAST WIN</div>

</div>

<div id="ticket-wrap">
  <img id="bg-img" src="scratch-bg2.png" draggable="false" />

</div>

<div class="result-banner idle" id="resultBanner" style="position:fixed; left:856px; top:404px;">SCRATCH YOUR TICKET</div>
<div class="result-banner win" id="winBanner" style="position:fixed; left:50%; transform:translateX(-50%); top:772px; display:none;"></div>

<div id="bottom-bar" style="position:fixed; left:711px; top:819px; margin:0; display:flex; align-items:center; gap:12px;">
  <div id="chip-bar" style="display:flex; gap:8px; align-items:center;">
    <button class="chip-btn" onclick="selectChip(100)"   id="chip-100">  <img src="chip-100.png"></button>
    <button class="chip-btn" onclick="selectChip(500)"   id="chip-500">  <img src="chip-500.png"></button>
    <button class="chip-btn" onclick="selectChip(1000)"  id="chip-1000"> <img src="chip-1000.png"></button>
    <button class="chip-btn" onclick="selectChip(5000)"  id="chip-5000"> <img src="chip-5000.png"></button>
    <button class="chip-btn" onclick="selectChip(10000)" id="chip-10000"><img src="chip-10000.png"></button>
  </div>
  <button class="btn btn-reveal" id="revealAllBtn" onclick="revealAllOrClear()">Clear Bets</button>
  <button class="btn btn-buy" id="buyBtn" onclick="buyTicket()">Buy Ticket</button>
</div>

<canvas id="fireworks-canvas"></canvas>

<!-- Banner Position Debug HUD -->
<div id="banner-debug-hud">
  <span id="banner-coords">x:0 y:0</span>
  <button id="banner-copy-btn" onclick="copyBannerCoords()">COPY</button>
  <button id="banner-copy-btn" onclick="toggleBannerDebug()" style="background:#ff4444;color:#fff;">DONE</button>
</div>

<!-- Pay Table Modal -->
<div id="paytable-modal" onclick="if(event.target===this)closePayTable()">
  <div id="paytable-inner">
    <h2>💰 Pay Table</h2>
    <div id="paytable-rows"></div>
    <button class="pt-close" onclick="closePayTable()">CLOSE</button>
  </div>
</div>

<!-- Debug panel -->
<div id="debug-panel">
  <h3>⬛ SCRATCH CELL DEBUGGER</h3>
  <div id="debug-coords"></div>
  <button class="dbtn dbtn-copy" onclick="copyCoords()">COPY</button>
  <button class="dbtn dbtn-done" onclick="toggleDebug()">CLOSE</button>
  <div style="margin-top:8px; color:#888; font-size:9px;">Drag boxes to position · Drag corner to resize</div>
</div>

<script>
  // ── CONFIG ──────────────────────────────────────────────────────────────
  const ROWS = 4;
  const COLS = 3;
  const CELLS = ROWS * COLS; // 12
  let TICKET_COST = 500; // updated by chip selection
  const SCRATCH_THRESHOLD = 0.45;

  // Cell positions locked by Mike 2026-03-31
  const DEFAULT_CELLS = [
    { x: 0.3558, y: 0.5168, w: 0.1368, h: 0.1282 }, // 1
    { x: 0.5056, y: 0.5209, w: 0.1430, h: 0.1241 }, // 2
    { x: 0.1963, y: 0.5195, w: 0.1389, h: 0.1269 }, // 3
    { x: 0.1955, y: 0.7821, w: 0.1450, h: 0.1365 }, // 4
    { x: 0.6640, y: 0.5241, w: 0.1430, h: 0.1255 }, // 5
    { x: 0.1984, y: 0.6503, w: 0.1430, h: 0.1337 }, // 6
    { x: 0.3640, y: 0.7852, w: 0.1327, h: 0.1351 }, // 7
    { x: 0.5117, y: 0.6549, w: 0.1286, h: 0.1310 }, // 8
    { x: 0.3527, y: 0.6494, w: 0.1389, h: 0.1296 }, // 9
    { x: 0.5166, y: 0.7908, w: 0.1306, h: 0.1310 }, // 10
    { x: 0.6723, y: 0.7857, w: 0.1347, h: 0.1378 }, // 11
    { x: 0.6656, y: 0.6512, w: 0.1347, h: 0.1296 }, // 12
  ];

  // Saved positions (populated from debug or defaults)
  let cellDefs = DEFAULT_CELLS.map(c => ({ ...c }));

  // Prizes as % of buy-in. img = path relative to scratch.html
  // PL casino: reverted to the original clean-number payout schedule
  // (10% house edge / ~90% RTP). The earlier 25%-edge variant multiplied
  // every pct by 0.833 which made labels look like garbage (104%/167%/417%).
  const PRIZES = [
    { pct:   10, label:   '10%', img: '../slots2/assets/images/symbols/q.png',        color: '#cccccc', weight:  9   },
    { pct:   25, label:   '25%', img: '../slots2/assets/images/symbols/k.png',        color: '#ffd700', weight: 12   },
    { pct:   50, label:   '50%', img: '../slots2/assets/images/symbols/clubs.png',    color: '#ffd700', weight: 21   },
    { pct:   75, label:   '75%', img: '../slots2/assets/images/symbols/diamonds.png', color: '#00ccff', weight: 23   },
    { pct:  125, label:  '125%', img: '../slots2/assets/images/symbols/hearts.png',   color: '#00ccff', weight: 18   },
    { pct:  150, label:  '150%', img: '../slots2/assets/images/symbols/spades.png',   color: '#ff8800', weight:  8   },
    { pct:  200, label:  '200%', img: '../slots2/assets/images/symbols/seven.png',    color: '#ff8800', weight:  3.5 },
    { pct:  500, label:  '500%', img: '../slots2/assets/images/symbols/scatter.png',  color: '#ff4400', weight:  1.5 },
    { pct: 2000, label: 'JACKPOT', img: '../slots2/assets/images/symbols/wild.png',   color: '#ff0066', weight:  0.3 },
  ];

  let balance = 0;
  // PL bridge bootstrap
  (async function(){
    const banner = document.getElementById('pl-banner');
    function showBanner(msg){ banner.textContent = msg; banner.style.display = 'block'; }
    try {
      const info = await PL.init();
      balance = info.balance;
      PL.onBalanceChanged((b)=>{ balance = b; if (typeof updateHUD === 'function') updateHUD(); });
    } catch (e) {
      showBanner('Casino offline: ' + (e && e.message || e) + ' — close this tab and buy in from a Casino Stone.');
    }
  })();
  async function plWagerScratch(amount){
    try { await PL.wager('scratch', amount); return true; }
    catch (e) {
      const banner = document.getElementById('pl-banner');
      if (e instanceof PL.errors.PLInsufficientFunds) {
        banner.textContent = 'Insufficient bank — bet rejected.';
        banner.style.display = 'block';
        setTimeout(()=>{ banner.style.display='none'; }, 2500);
      }
      return false;
    }
  }
  async function plSettleScratch(amount){
    if (amount <= 0) return;
    try { await PL.settle('scratch', amount); }
    catch (e) { console.error('scratch settle failed', e); }
  }
  let buyin = 500; // updated per ticket purchase

  // 🎰 CHIP SELECTION
  function selectChip(amount) {
    TICKET_COST += amount;
    buyin = TICKET_COST;
    // Highlight the last clicked chip
    document.querySelectorAll('.chip-btn').forEach(b => b.classList.remove('selected'));
    document.getElementById('chip-' + amount).classList.add('selected');
    document.getElementById('betDisplay').textContent = TICKET_COST.toLocaleString() + 'g';
    document.getElementById('buyBtn').disabled = balance < TICKET_COST;
  }
  // Default bet: 0 (player builds it with chips)
  window.addEventListener('DOMContentLoaded', () => {
    TICKET_COST = 0;
    buyin = 0;
    document.getElementById('betDisplay').textContent = '0g';
    document.getElementById('buyBtn').disabled = true;
  });
  let ticketActive = false;
  let ticketValues = [];
  let cellRevealed = [];
  let isScratching = false;
  let activeCellIdx = -1;
  let debugMode = false;

  // 🔊 SCRATCH AUDIO
  const scratchAudio = new Audio('scratch-sound.mp3');
  scratchAudio.loop = true;
  scratchAudio.volume = 0.6;
  let scratchAudioPlaying = false;
  let scratchStopTimer = null;

  function scratchSoundStart() {
    if (scratchStopTimer) { clearTimeout(scratchStopTimer); scratchStopTimer = null; }
    if (!scratchAudioPlaying) {
      scratchAudio.play().catch(() => {});
      scratchAudioPlaying = true;
    }
  }
  function scratchSoundStop() {
    // Small debounce so brief pauses between cells don't cut audio
    if (scratchStopTimer) clearTimeout(scratchStopTimer);
    scratchStopTimer = setTimeout(() => {
      scratchAudio.pause();
      scratchAudio.currentTime = 0;
      scratchAudioPlaying = false;
      scratchStopTimer = null;
    }, 120);
  }

  // 📋 PAY TABLE
  function openPayTable() {
    const totalWeight = PRIZES.reduce((s, p) => s + p.weight, 0);
    const container = document.getElementById('paytable-rows');
    container.innerHTML = '';
    for (const p of PRIZES) {
      const odds = ((p.weight / totalWeight) * 100).toFixed(1);
      const row = document.createElement('div');
      row.className = 'pt-row';
      row.style.color = p.color;
      row.innerHTML = `<span class="pt-prize">${p.label}</span><span class="pt-odds">${odds}% chance</span>`;
      container.appendChild(row);
    }
    document.getElementById('paytable-modal').classList.add('open');
  }
  function closePayTable() {
    document.getElementById('paytable-modal').classList.remove('open');
  }

  // 📐 BANNER POSITION DEBUGGER
  let bannerDebugActive = false;
  let bannerDrag = null;

  function toggleBannerDebug() {
    const banner = document.getElementById('resultBanner');
    const hud    = document.getElementById('banner-debug-hud');
    bannerDebugActive = !bannerDebugActive;
    if (bannerDebugActive) {
      // Snapshot current position and go fixed
      const r = banner.getBoundingClientRect();

  // ── PRIZE LOGIC ────────────────────────────────────────────────────────
  function fmt(n) { return n.toLocaleString() + 'g'; }
  function updateHUD() { document.getElementById('balanceDisplay').textContent = fmt(balance); }

  function weightedRandom() {
    const total = PRIZES.reduce((s, p) => s + p.weight, 0);
    let r = Math.random() * total;
    for (const p of PRIZES) { r -= p.weight; if (r <= 0) return p; }
    return PRIZES[0];
  }

  function generateTicket() {
    // Every ticket guaranteed exactly one winning triple
    // Pick a winning prize (weighted - skews toward lower %)
    const winPrize = weightedRandom();

    // Place 3 of the winner at random positions
    const positions = [];
    while (positions.length < 3) {
      const p = Math.floor(Math.random() * CELLS);
      if (!positions.includes(p)) positions.push(p);
    }

    const values = [];
    for (let i = 0; i < CELLS; i++) {
      if (positions.includes(i)) {
        values.push(winPrize);
      } else {
        // Fill rest - cap any symbol at max 3 total (including winner positions)
        // Winner already has 3, so non-winning cells must not add any more of winPrize
        // Non-winning symbols can appear at most 2 times in non-winning slots (2 total since no triples allowed)
        let pick, attempts = 0;
        do {
          pick = weightedRandom();
          attempts++;
          const totalSoFar = values.filter(v => v.pct === pick.pct).length
                           + (pick.pct === winPrize.pct ? 3 : 0); // account for winner positions
          if (totalSoFar < 2 || attempts > 20) break;
        } while (true);
        // Final safety: never allow winPrize in non-winning slots (would exceed 3)
        if (pick.pct === winPrize.pct) {
          let safePick, att2 = 0;
          do { safePick = weightedRandom(); att2++; } while (safePick.pct === winPrize.pct && att2 < 20);
          pick = safePick;
        }
        values.push(pick);
      }
    }

    // Final pass: enforce hard cap of 3 max for any symbol
    const counts = {};
    for (const v of values) counts[v.pct] = (counts[v.pct] || 0) + 1;
    for (const [pct, cnt] of Object.entries(counts)) {
      if (cnt > 3) {
        // Replace excess non-winner occurrences
        let removed = 0;
        for (let i = 0; i < values.length; i++) {
          if (values[i].pct == parseInt(pct) && !positions.includes(i) && removed < cnt - 3) {
            let rep, att = 0;
            do { rep = weightedRandom(); att++; } while ((rep.pct == parseInt(pct) || rep.pct === winPrize.pct) && att < 20);
            values[i] = rep;
            removed++;
          }
        }
      }
      if (cnt >= 3 && parseInt(pct) !== winPrize.pct) {
        // Replace one non-winner occurrence to prevent accidental second triple
        for (let i = 0; i < values.length; i++) {
          if (values[i].pct == parseInt(pct) && !positions.includes(i)) {
            let rep, att = 0;
            do { rep = weightedRandom(); att++; } while ((rep.pct == parseInt(pct) || rep.pct === winPrize.pct) && att < 15);
            values[i] = rep;
            break;
          }
        }
      }
    }

    return values;
  }

  // Returns array of winning prizes (pct values that appear 3+ times)
  function findWins(values) {
    const counts = {};
    for (const v of values) counts[v.pct] = (counts[v.pct] || 0) + 1;
    return Object.entries(counts).filter(([,c]) => c >= 3).map(([p]) => parseInt(p));
  }

  function calcPayout(winPcts) {
    // Sum all winning pcts, apply to buy-in
    return winPcts.reduce((s, pct) => s + Math.floor(buyin * pct / 100), 0);
  }

  // ── SCRATCH CELLS ─────────────────────────────────────────────────────
  async function rebuildScratchCells() {
    await coverReady;
    const layer = document.getElementById('scratch-layer');
    layer.querySelectorAll('.scratch-cell').forEach(e => e.remove());
    if (!ticketActive) return;

    const r = imgRect();

    cellDefs.forEach((def, i) => {
      const cell = document.createElement('div');
      cell.className = 'scratch-cell';
      cell.id = `scell-${i}`;
      cell.style.left   = (def.x * r.width)  + 'px';
      cell.style.top    = (def.y * r.height) + 'px';
      cell.style.width  = (def.w * r.width)  + 'px';
      cell.style.height = (def.h * r.height) + 'px';

      const prize = ticketValues[i];

      // Prize display (under scratch layer)
      const prizeDiv = document.createElement('div');
      prizeDiv.className = 'cell-prize-display';
      prizeDiv.id = `cprize-${i}`;
      prizeDiv.style.color = prize.color;
      prizeDiv.innerHTML = `
        <span class="prize-pct-text" style="color:${prize.color};text-shadow:0 0 10px ${prize.color}88;">${prize.label}</span>
      `;
      cell.appendChild(prizeDiv);

      // Scratch canvas
      const canvas = document.createElement('canvas');
      canvas.id = `ccanvas-${i}`;
      cell.appendChild(canvas);

      layer.appendChild(cell);
      fitPrizeText(cell);

      initCanvas(canvas, def, r, i);
    });
  }

  // Preload the cover image once - cells won't build until it's ready
  const coverImg = new Image();
  const coverReady = new Promise(resolve => {
    coverImg.onload = resolve;
    coverImg.onerror = resolve; // fail gracefully
  });
  coverImg.src = 'scratch-cover.png';

  function initCanvas(canvas, def, r, i) {
    const w = Math.round(def.w * r.width);
    const h = Math.round(def.h * r.height);
    canvas.width  = w;
    canvas.height = h;
    canvas.style.width  = '100%';
    canvas.style.height = '100%';

    const ctx = canvas.getContext('2d');
    // coverImg is guaranteed loaded before initCanvas is ever called
    ctx.drawImage(coverImg, 0, 0, w, h);

    canvas.addEventListener('mousedown', (e) => { if (!ticketActive || cellRevealed[i]) return; isScratching = true; activeCellIdx = i; scratchSoundStart(); scratch(e, canvas, i); });
    canvas.addEventListener('mousemove', (e) => { if (!isScratching || activeCellIdx !== i || !ticketActive || cellRevealed[i]) return; scratchSoundStart(); scratch(e, canvas, i); });
    canvas.addEventListener('mouseup',   () => { isScratching = false; activeCellIdx = -1; scratchSoundStop(); });
    canvas.addEventListener('mouseleave',() => { isScratching = false; activeCellIdx = -1; scratchSoundStop(); });
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); if (!ticketActive || cellRevealed[i]) return; isScratching = true; activeCellIdx = i; scratchSoundStart(); scratch(e.touches[0], canvas, i); }, { passive: false });
    canvas.addEventListener('touchmove',  (e) => { e.preventDefault(); if (!isScratching || activeCellIdx !== i || !ticketActive || cellRevealed[i]) return; scratchSoundStart(); scratch(e.touches[0], canvas, i); }, { passive: false });
    canvas.addEventListener('touchend',   () => { isScratching = false; activeCellIdx = -1; scratchSoundStop(); });
  }

  // Fit prize text to fill the cell as large as possible
  function fitPrizeText(cell) {
    const span = cell.querySelector('.prize-pct-text');
    if (!span) return;
    const maxW = cell.offsetWidth  * 0.92;
    const maxH = cell.offsetHeight * 0.88;
    let lo = 8, hi = 300, mid;
    for (let i = 0; i < 16; i++) {
      mid = (lo + hi) / 2;
      span.style.fontSize = mid + 'px';
      if (span.offsetWidth <= maxW && span.offsetHeight <= maxH) lo = mid;
      else hi = mid;
    }
    span.style.fontSize = lo + 'px';
  }

  // Preload cursor image for use as scratch brush
  const brushImg = new Image();
  brushImg.src = 'scratch-cursor-64.png';

  function scratch(e, canvas, i) {
    const rect = canvas.getBoundingClientRect();
    const sx = (e.clientX - rect.left) * (canvas.width  / rect.width);
    const sy = (e.clientY - rect.top)  * (canvas.height / rect.height);
    const ctx = canvas.getContext('2d');
    const brushSize = Math.max(canvas.width, canvas.height) * 0.33;
    ctx.globalCompositeOperation = 'destination-out';
    if (brushImg.complete && brushImg.naturalWidth > 0) {
      ctx.drawImage(brushImg, sx - brushSize / 2, sy - brushSize / 2, brushSize, brushSize);
    } else {
      ctx.beginPath(); ctx.arc(sx, sy, brushSize / 2, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalCompositeOperation = 'source-over';
    checkCoverage(canvas, i);
  }

  function checkCoverage(canvas, i) {
    if (cellRevealed[i]) return;
    const data = canvas.getContext('2d').getImageData(0, 0, canvas.width, canvas.height).data;
    let transparent = 0;
    for (let j = 3; j < data.length; j += 4) if (data[j] < 128) transparent++;
    if (transparent / (canvas.width * canvas.height) >= SCRATCH_THRESHOLD) revealCell(i);
  }

  function revealCell(i) {
    if (cellRevealed[i]) return;
    cellRevealed[i] = true;
    const cell = document.getElementById(`scell-${i}`);
    if (cell) { const c = cell.querySelector('canvas'); if (c) c.style.display = 'none'; }
    if (cellRevealed.every(r => r)) finishTicket();
  }

  function revealAllOrClear() {
    if (!ticketActive) {
      // Clear bets mode
      TICKET_COST = 0;
      buyin = 0;
      document.getElementById('betDisplay').textContent = '0g';
      document.querySelectorAll('.chip-btn').forEach(b => b.classList.remove('selected'));

      revealAll();

  }

  function revealAll() {
    if (!ticketActive) return;
    for (let i = 0; i < CELLS; i++) revealCell(i);
  }

  async function finishTicket() {
    ticketActive = false;
    document.getElementById('revealAllBtn').textContent = 'Clear Bets';

    const winPcts = findWins(ticketValues);
    const totalWin = calcPayout(winPcts);

    // Always a winner - highlight matching cells
    for (let i = 0; i < CELLS; i++) {
      if (winPcts.includes(ticketValues[i].pct)) {
        const prizeDiv = document.getElementById(`cprize-${i}`);
        if (prizeDiv) prizeDiv.classList.add('winner-glow');
      }
    }

    if (totalWin > 0) await plSettleScratch(totalWin); else await plSettleScratch(0);
    updateHUD();
    document.getElementById('lastWinDisplay').textContent = fmt(totalWin);
    document.getElementById('lastWinDisplay').className = 'hud-value green';

    const winBanner = document.getElementById('winBanner');
    winBanner.style.display = '';
    const winPrize = ticketValues.find(v => winPcts.includes(v.pct));
    if (winPrize && winPrize.pct >= 1000)    { winBanner.textContent = `🎰 JACKPOT! +${fmt(totalWin)}!`;   spawnParticles('💰', 20); launchFireworks(6000); }
    else if (winPrize && winPrize.pct >= 167){ winBanner.textContent = `🏆 BIG WIN! +${fmt(totalWin)}`;    spawnParticles('⭐', 12); launchFireworks(5000); }
    else if (winPrize && winPrize.pct >= 104){ winBanner.textContent = `✨ WINNER! +${fmt(totalWin)}`;      spawnParticles('✨', 8);  launchFireworks(4000); }
    else                                      { winBanner.textContent = `You win ${fmt(totalWin)}! Match: ${winPrize ? winPrize.label : ''}`;  }
    document.getElementById('buyBtn').disabled = balance < TICKET_COST;
  }

  async function buyTicket() {
    if (TICKET_COST <= 0 || balance < TICKET_COST) return;
    buyin = TICKET_COST;
    const ok = await plWagerScratch(TICKET_COST);
    if (!ok) return;
    // Reset bet display for next round
    TICKET_COST = 0;
    document.getElementById('betDisplay').textContent = '0g';
    document.querySelectorAll('.chip-btn').forEach(b => b.classList.remove('selected'));
    updateHUD();
    ticketValues = generateTicket();
    cellRevealed = new Array(CELLS).fill(false);
    ticketActive = true;
    document.getElementById('resultBanner').className = 'result-banner idle';
    document.getElementById('resultBanner').textContent = 'SCRATCH YOUR TICKET';
    document.getElementById('winBanner').style.display = 'none';
    document.getElementById('winBanner').textContent = '';
    document.getElementById('revealAllBtn').textContent = 'Reveal All';
    document.getElementById('buyBtn').disabled = false;
    if (!debugMode) rebuildScratchCells();
  }

  function spawnParticles(emoji, count) {
    const wrap = document.getElementById('ticket-wrap');
    const r = wrap.getBoundingClientRect();
    for (let i = 0; i < count; i++) {
      setTimeout(() => {
        const p = document.createElement('div');
        p.className = 'particle';
        p.textContent = emoji;
        p.style.left = (r.left + Math.random() * r.width) + 'px';
        p.style.top  = (r.top  + Math.random() * r.height * 0.6 + r.height * 0.2) + 'px';
        p.style.animationDelay = (Math.random() * 0.4) + 's';
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 2000);
      }, i * 60);
    }
  }

  // 🎆 FIREWORKS
  const fireworksAudio = new Audio('fireworks.mp3');
  fireworksAudio.volume = 0.7;
  let fwAnimId = null;
  let fwActive = false;

  function launchFireworks(durationMs = 4000) {
    if (fwActive) return;
    fwActive = true;
    fireworksAudio.currentTime = 0;
    fireworksAudio.play().catch(()=>{});

    const canvas = document.getElementById('fireworks-canvas');
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    const ctx = canvas.getContext('2d');
    const particles = [];
    const colors = ['#ff0044','#ff8800','#ffd700','#00ff88','#00ccff','#ff44ff','#ffffff'];

    function Particle(x, y, vx, vy, color, life) {
      return { x, y, vx, vy, color, life, maxLife: life, size: Math.random() * 3 + 1.5 };
    }

    function burst(x, y) {
      const count = 60 + Math.floor(Math.random() * 40);
      const color = colors[Math.floor(Math.random() * colors.length)];
      const color2 = colors[Math.floor(Math.random() * colors.length)];
      for (let i = 0; i < count; i++) {
        const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.3;
        const speed = Math.random() * 6 + 2;
        const c = Math.random() < 0.5 ? color : color2;
        particles.push(Particle(x, y, Math.cos(angle)*speed, Math.sin(angle)*speed, c, 90 + Math.random()*30));
      }
    }

    const startTime = performance.now();
    let lastBurst = 0;

    function frame(now) {
      const elapsed = now - startTime;
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Launch new bursts periodically
      if (now - lastBurst > 300 + Math.random() * 250) {
        const x = canvas.width  * (0.15 + Math.random() * 0.7);
        const y = canvas.height * (0.1  + Math.random() * 0.5);
        burst(x, y);
        lastBurst = now;
      }

      // Update + draw particles
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x  += p.vx; p.y  += p.vy;
        p.vy += 0.12; // gravity
        p.vx *= 0.97; p.vy *= 0.97;
        p.life--;
        if (p.life <= 0) { particles.splice(i, 1); continue; }
        const alpha = p.life / p.maxLife;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;

      if (elapsed < durationMs) {
        fwAnimId = requestAnimationFrame(frame);
      } else {
        // Drain remaining particles
        function drain(ts) {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.x += p.vx; p.y += p.vy; p.vy += 0.12; p.vx *= 0.97; p.vy *= 0.97; p.life--;
            if (p.life <= 0) { particles.splice(i, 1); continue; }
            const alpha = p.life / p.maxLife;
            ctx.globalAlpha = alpha;
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.globalAlpha = 1;
          if (particles.length > 0) requestAnimationFrame(drain);
          else fwActive = false;
        }
        requestAnimationFrame(drain);
      }
    }
    fwAnimId = requestAnimationFrame(frame);
  }

  // Reposition cells on resize
  window.addEventListener('resize', () => {
    if (debugMode) buildDebugBoxes();
    else rebuildScratchCells();
  });

  // Init - wait for both bg image and cover before starting
  const bgImg2 = document.getElementById('bg-img');
  const bgReady = bgImg2.complete
    ? Promise.resolve()
    : new Promise(r => { bgImg2.onload = r; bgImg2.onerror = r; });

  Promise.all([bgReady, coverReady]).then(() => {
    updateHUD();
    buyTicket();
  });
</script>
