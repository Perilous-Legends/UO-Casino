<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lucky Scratch - HoH Casino</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a0a00;
      color: #ffd700;
      font-family: Georgia, serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
      user-select: none;
    }

    .hud {
      display: flex;
      gap: 24px;
      align-items: center;
      background: rgba(0,0,0,0.6);
      border: 1px solid #c9a84c44;
      border-radius: 8px;
      padding: 8px 20px;
      margin-bottom: 12px;
      font-size: 13px;
    }
    .hud-item { display: flex; flex-direction: column; align-items: center; gap: 1px; }
    .hud-label { font-size: 9px; color: #888; letter-spacing: 1px; }
    .hud-value { font-size: 16px; color: #ffd700; font-weight: bold; }
    .hud-value.green { color: #00ff88; }
    .hud-value.red   { color: #ff4444; }

    /* Ticket wrapper - sized to image */
    #ticket-wrap {
      position: relative;
      display: inline-block;
      line-height: 0;
    }

    #bg-img {
      display: block;
      max-width: 100%;
      max-height: 80vh;
      width: auto;
      height: auto;
    }

    /* Scratch cells overlay - absolute, covers image exactly */
    #scratch-layer {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; /* cells handle their own events */
    }

    /* Each scratch cell */
    .scratch-cell {
      position: absolute;
      overflow: hidden;
      cursor: crosshair;
      pointer-events: all;
    }

    .scratch-cell canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1;
    }

    .cell-prize-display {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: bold;
      pointer-events: none;
      z-index: 0;
      background: #0d0600;
    }

    /* DEBUG MODE */
    .debug-box {
      position: absolute;
      border: 2px solid #00ff00;
      background: rgba(0,255,0,0.15);
      cursor: move;
      pointer-events: all;
      z-index: 100;
    }
    .debug-box.active-drag { border-color: #ffff00; background: rgba(255,255,0,0.2); }

    .debug-label {
      position: absolute;
      top: 2px; left: 4px;
      font-size: 9px;
      color: #00ff00;
      font-family: monospace;
      white-space: nowrap;
      pointer-events: none;
    }

    /* Resize handle - bottom-right corner */
    .resize-handle {
      position: absolute;
      bottom: 0; right: 0;
      width: 12px; height: 12px;
      background: #00ff00;
      cursor: nwse-resize;
      pointer-events: all;
    }

    /* Debug panel */
    #debug-panel {
      position: fixed;
      top: 8px; right: 8px;
      width: 280px;
      background: rgba(0,0,0,0.92);
      border: 2px solid #00ff00;
      border-radius: 8px;
      padding: 10px;
      font-family: monospace;
      font-size: 10px;
      color: #00ff00;
      z-index: 200;
      display: none;
    }

    #debug-panel h3 {
      font-size: 11px;
      color: #ffff00;
      margin-bottom: 8px;
      letter-spacing: 2px;
    }

    #debug-coords {
      line-height: 1.8;
      margin-bottom: 10px;
      white-space: pre;
    }

    .dbtn {
      display: inline-block;
      padding: 5px 10px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-family: monospace;
      font-size: 10px;
      font-weight: bold;
      margin: 2px;
    }
    .dbtn-copy { background: #00ff00; color: #000; }
    .dbtn-toggle { background: #ffff00; color: #000; }
    .dbtn-done { background: #ff6600; color: #000; }

    /* Bottom bar */
    #bottom-bar {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      padding: 10px 22px;
      border: none;
      border-radius: 8px;
      font-family: Georgia, serif;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all 0.2s;
    }
    .btn-buy    { background: linear-gradient(135deg,#c9a84c,#ffd700); color:#1a0a00; }
    .btn-buy:hover { transform:scale(1.04); box-shadow:0 0 14px #ffd70066; }
    .btn-buy:disabled { background:#444; color:#888; cursor:not-allowed; transform:none; }
    .btn-reveal { background:rgba(255,255,255,0.08); color:#ffd700; border:1px solid #c9a84c44; }
    .btn-reveal:disabled { opacity:0.3; cursor:not-allowed; }
    .btn-debug  { background:rgba(0,255,0,0.15); color:#00ff00; border:1px solid #00ff0066; }

    .result-banner {
      text-align:center; padding:8px 20px; border-radius:8px;
      font-size:16px; font-weight:bold; letter-spacing:2px;
      min-width: 220px;
    }
    .result-banner.idle { border:1px solid #c9a84c22; color:#c9a84c66; font-size:11px; }
    .result-banner.win  { background:rgba(0,255,100,0.15); border:1px solid #00ff88; color:#00ff88; }
    .result-banner.lose { background:rgba(255,50,50,0.1);  border:1px solid #ff444488; color:#ff6666; }

    @keyframes floatUp {
      0%   { transform:translateY(0) scale(1); opacity:1; }
      100% { transform:translateY(-80px) scale(1.4); opacity:0; }
    }
    .particle { position:fixed; pointer-events:none; font-size:20px; animation:floatUp 1.2s ease-out forwards; z-index:999; }

    @keyframes pulse {
      0%,100% { box-shadow: inset 0 0 10px #ffd70066; }
      50%      { box-shadow: inset 0 0 22px #ffd700cc; }
    }
    .winner-glow { animation: pulse 0.8s ease-in-out infinite; }
  </style>
</head>
<body>

<div class="hud">
  <div class="hud-item">
    <div class="hud-label">BALANCE</div>
    <div class="hud-value" id="balanceDisplay">100,000g</div>
  </div>
  <div class="hud-item">
    <div class="hud-label">TICKET COST</div>
    <div class="hud-value" style="color:#c9a84c">500g</div>
  </div>
  <div class="hud-item">
    <div class="hud-label">LAST WIN</div>
    <div class="hud-value green" id="lastWinDisplay">---</div>
  </div>
</div>

<div id="ticket-wrap">
  <img id="bg-img" src="scratch-bg2.png" draggable="false" />
  <div id="scratch-layer"></div>
</div>

<div id="bottom-bar">
  <div class="result-banner idle" id="resultBanner">SCRATCH YOUR TICKET</div>
  <button class="btn btn-reveal" id="revealAllBtn" onclick="revealAll()" disabled>Reveal All</button>
  <button class="btn btn-buy" id="buyBtn" onclick="buyTicket()">Buy Ticket (500g)</button>
  <button class="btn btn-debug" onclick="toggleDebug()">⬛ Debug</button>
</div>

<!-- Debug panel -->
<div id="debug-panel">
  <h3>⬛ SCRATCH CELL DEBUGGER</h3>
  <div id="debug-coords"></div>
  <button class="dbtn dbtn-copy" onclick="copyCoords()">COPY</button>
  <button class="dbtn dbtn-done" onclick="toggleDebug()">CLOSE</button>
  <div style="margin-top:8px; color:#888; font-size:9px;">Drag boxes to position · Drag corner to resize</div>
</div>

<script>
  // ── CONFIG ──────────────────────────────────────────────────────────────
  const ROWS = 4;
  const COLS = 3;
  const CELLS = ROWS * COLS; // 12
  const TICKET_COST = 500;
  const SCRATCH_THRESHOLD = 0.45;

  // Cell positions locked by Mike 2026-03-31
  const DEFAULT_CELLS = [
    { x: 0.3558, y: 0.5168, w: 0.1368, h: 0.1282 }, // 1
    { x: 0.5056, y: 0.5209, w: 0.1430, h: 0.1241 }, // 2
    { x: 0.1963, y: 0.5195, w: 0.1389, h: 0.1269 }, // 3
    { x: 0.1955, y: 0.7821, w: 0.1450, h: 0.1365 }, // 4
    { x: 0.6640, y: 0.5241, w: 0.1430, h: 0.1255 }, // 5
    { x: 0.1984, y: 0.6503, w: 0.1430, h: 0.1337 }, // 6
    { x: 0.3640, y: 0.7852, w: 0.1327, h: 0.1351 }, // 7
    { x: 0.5117, y: 0.6549, w: 0.1286, h: 0.1310 }, // 8
    { x: 0.3527, y: 0.6494, w: 0.1389, h: 0.1296 }, // 9
    { x: 0.5166, y: 0.7908, w: 0.1306, h: 0.1310 }, // 10
    { x: 0.6723, y: 0.7857, w: 0.1347, h: 0.1378 }, // 11
    { x: 0.6656, y: 0.6512, w: 0.1347, h: 0.1296 }, // 12
  ];

  // Saved positions (populated from debug or defaults)
  let cellDefs = DEFAULT_CELLS.map(c => ({ ...c }));

  // Prizes as % of buy-in. img = path relative to scratch.html
  const PRIZES = [
    { pct:    5, label:   '5%', img: '../slots2/assets/images/symbols/j.png',        color: '#aaaaaa', weight: 38 },
    { pct:   10, label:  '10%', img: '../slots2/assets/images/symbols/q.png',        color: '#cccccc', weight: 26 },
    { pct:   25, label:  '25%', img: '../slots2/assets/images/symbols/k.png',        color: '#ffd700', weight: 16 },
    { pct:   50, label:  '50%', img: '../slots2/assets/images/symbols/clubs.png',    color: '#ffd700', weight:  9 },
    { pct:   75, label:  '75%', img: '../slots2/assets/images/symbols/diamonds.png', color: '#00ccff', weight:  5 },
    { pct:  100, label: '100%', img: '../slots2/assets/images/symbols/hearts.png',   color: '#00ccff', weight:  3 },
    { pct:  150, label: '150%', img: '../slots2/assets/images/symbols/spades.png',   color: '#ff8800', weight:  2 },
    { pct:  200, label: '200%', img: '../slots2/assets/images/symbols/seven.png',    color: '#ff8800', weight:  1 },
    { pct:  500, label: '500%', img: '../slots2/assets/images/symbols/scatter.png',  color: '#ff4400', weight: 0.4 },
    { pct: 2000, label: 'JACKPOT', img: '../slots2/assets/images/symbols/wild.png',  color: '#ff0066', weight: 0.1 },
  ];

  let balance = 100000;
  let buyin = 500; // updated per ticket purchase
  let ticketActive = false;
  let ticketValues = [];
  let cellRevealed = [];
  let isScratching = false;
  let activeCellIdx = -1;
  let debugMode = false;

  // ── DEBUG DRAG ────────────────────────────────────────────────────────
  let dragState = null; // { idx, type:'move'|'resize', startX, startY, origX, origY, origW, origH }

  function imgRect() {
    return document.getElementById('bg-img').getBoundingClientRect();
  }

  function buildDebugBoxes() {
    const layer = document.getElementById('scratch-layer');
    // Remove existing debug boxes
    layer.querySelectorAll('.debug-box').forEach(e => e.remove());

    const r = imgRect();

    cellDefs.forEach((def, i) => {
      const box = document.createElement('div');
      box.className = 'debug-box';
      box.id = `dbox-${i}`;
      positionDebugBox(box, def, r);

      const label = document.createElement('div');
      label.className = 'debug-label';
      label.id = `dlabel-${i}`;
      label.textContent = `#${i+1}`;
      box.appendChild(label);

      const handle = document.createElement('div');
      handle.className = 'resize-handle';
      handle.addEventListener('mousedown', (e) => {
        e.stopPropagation();
        e.preventDefault();
        const r2 = imgRect();
        dragState = { idx: i, type: 'resize',
          startX: e.clientX, startY: e.clientY,
          origW: def.w, origH: def.h };
      });
      handle.addEventListener('touchstart', (e) => {
        e.stopPropagation(); e.preventDefault();
        const t = e.touches[0];
        dragState = { idx: i, type: 'resize',
          startX: t.clientX, startY: t.clientY,
          origW: def.w, origH: def.h };
      }, { passive: false });
      box.appendChild(handle);

      box.addEventListener('mousedown', (e) => {
        if (e.target === handle) return;
        e.preventDefault();
        const r2 = imgRect();
        dragState = { idx: i, type: 'move',
          startX: e.clientX, startY: e.clientY,
          origX: def.x, origY: def.y };
      });
      box.addEventListener('touchstart', (e) => {
        if (e.target === handle) return;
        e.preventDefault();
        const t = e.touches[0];
        dragState = { idx: i, type: 'move',
          startX: t.clientX, startY: t.clientY,
          origX: def.x, origY: def.y };
      }, { passive: false });

      layer.appendChild(box);
    });

    updateDebugCoords();
  }

  function positionDebugBox(box, def, r) {
    box.style.left   = (def.x * r.width)  + 'px';
    box.style.top    = (def.y * r.height) + 'px';
    box.style.width  = (def.w * r.width)  + 'px';
    box.style.height = (def.h * r.height) + 'px';
  }

  function onDragMove(clientX, clientY) {
    if (!dragState || !debugMode) return;
    const r = imgRect();
    const { idx, type, startX, startY } = dragState;
    const def = cellDefs[idx];
    const dx = (clientX - startX) / r.width;
    const dy = (clientY - startY) / r.height;

    if (type === 'move') {
      def.x = Math.max(0, Math.min(1 - def.w, dragState.origX + dx));
      def.y = Math.max(0, Math.min(1 - def.h, dragState.origY + dy));
    } else {
      def.w = Math.max(0.03, dragState.origW + dx);
      def.h = Math.max(0.02, dragState.origH + dy);
    }

    const box = document.getElementById(`dbox-${idx}`);
    positionDebugBox(box, def, r);
    updateDebugCoords();
  }

  document.addEventListener('mousemove', (e) => onDragMove(e.clientX, e.clientY));
  document.addEventListener('touchmove', (e) => {
    if (dragState) { e.preventDefault(); onDragMove(e.touches[0].clientX, e.touches[0].clientY); }
  }, { passive: false });
  document.addEventListener('mouseup',   () => { dragState = null; });
  document.addEventListener('touchend',  () => { dragState = null; });

  function updateDebugCoords() {
    const lines = cellDefs.map((d, i) =>
      `#${String(i+1).padStart(2)}: x:${d.x.toFixed(3)} y:${d.y.toFixed(3)} w:${d.w.toFixed(3)} h:${d.h.toFixed(3)}`
    );
    document.getElementById('debug-coords').textContent = lines.join('\n');
  }

  function copyCoords() {
    const obj = cellDefs.map((d, i) => ({
      cell: i + 1,
      x: parseFloat(d.x.toFixed(4)),
      y: parseFloat(d.y.toFixed(4)),
      w: parseFloat(d.w.toFixed(4)),
      h: parseFloat(d.h.toFixed(4))
    }));
    navigator.clipboard.writeText(JSON.stringify(obj, null, 2)).then(() => {
      const btn = document.querySelector('.dbtn-copy');
      btn.textContent = 'COPIED!';
      setTimeout(() => btn.textContent = 'COPY', 1500);
    });
  }

  function toggleDebug() {
    debugMode = !debugMode;
    const panel = document.getElementById('debug-panel');
    const layer = document.getElementById('scratch-layer');

    panel.style.display = debugMode ? 'block' : 'none';

    if (debugMode) {
      // Hide scratch cells, show debug boxes
      layer.querySelectorAll('.scratch-cell').forEach(e => e.style.display = 'none');
      buildDebugBoxes();
    } else {
      // Hide debug boxes, show scratch cells
      layer.querySelectorAll('.debug-box').forEach(e => e.remove());
      layer.querySelectorAll('.scratch-cell').forEach(e => e.style.display = '');
      rebuildScratchCells();
    }
  }

  // ── PRIZE LOGIC ────────────────────────────────────────────────────────
  function fmt(n) { return n.toLocaleString() + 'g'; }
  function updateHUD() { document.getElementById('balanceDisplay').textContent = fmt(balance); }

  function weightedRandom() {
    const total = PRIZES.reduce((s, p) => s + p.weight, 0);
    let r = Math.random() * total;
    for (const p of PRIZES) { r -= p.weight; if (r <= 0) return p; }
    return PRIZES[0];
  }

  function generateTicket() {
    // Every ticket guaranteed exactly one winning triple
    // Pick a winning prize (weighted - skews toward lower %)
    const winPrize = weightedRandom();

    // Place 3 of the winner at random positions
    const positions = [];
    while (positions.length < 3) {
      const p = Math.floor(Math.random() * CELLS);
      if (!positions.includes(p)) positions.push(p);
    }

    const values = [];
    for (let i = 0; i < CELLS; i++) {
      if (positions.includes(i)) {
        values.push(winPrize);
      } else {
        // Fill rest - avoid accidentally creating a second triple
        let pick, attempts = 0;
        do {
          pick = weightedRandom();
          attempts++;
          // Count how many of this pct we already have in non-winning spots
          const existing = values.filter(v => v.pct === pick.pct).length;
          if (existing < 2 || attempts > 15) break;
        } while (true);
        values.push(pick);
      }
    }

    // Verify no accidental second triple sneaked in, fix if so
    const counts = {};
    for (const v of values) counts[v.pct] = (counts[v.pct] || 0) + 1;
    for (const [pct, cnt] of Object.entries(counts)) {
      if (cnt >= 3 && parseInt(pct) !== winPrize.pct) {
        // Replace one non-winner occurrence
        for (let i = 0; i < values.length; i++) {
          if (values[i].pct == pct && !positions.includes(i)) {
            let rep, att = 0;
            do { rep = weightedRandom(); att++; } while (rep.pct == pct && att < 15);
            values[i] = rep;
            break;
          }
        }
      }
    }

    return values;
  }

  // Returns array of winning prizes (pct values that appear 3+ times)
  function findWins(values) {
    const counts = {};
    for (const v of values) counts[v.pct] = (counts[v.pct] || 0) + 1;
    return Object.entries(counts).filter(([,c]) => c >= 3).map(([p]) => parseInt(p));
  }

  function calcPayout(winPcts) {
    // Sum all winning pcts, apply to buy-in
    return winPcts.reduce((s, pct) => s + Math.floor(buyin * pct / 100), 0);
  }

  // ── SCRATCH CELLS ─────────────────────────────────────────────────────
  function rebuildScratchCells() {
    const layer = document.getElementById('scratch-layer');
    layer.querySelectorAll('.scratch-cell').forEach(e => e.remove());
    if (!ticketActive) return;

    const r = imgRect();

    cellDefs.forEach((def, i) => {
      const cell = document.createElement('div');
      cell.className = 'scratch-cell';
      cell.id = `scell-${i}`;
      cell.style.left   = (def.x * r.width)  + 'px';
      cell.style.top    = (def.y * r.height) + 'px';
      cell.style.width  = (def.w * r.width)  + 'px';
      cell.style.height = (def.h * r.height) + 'px';

      const prize = ticketValues[i];

      // Prize display (under scratch layer)
      const prizeDiv = document.createElement('div');
      prizeDiv.className = 'cell-prize-display';
      prizeDiv.id = `cprize-${i}`;
      prizeDiv.style.color = prize.color;
      const payout = Math.floor(buyin * prize.pct / 100);
      prizeDiv.innerHTML = `
        <img src="${prize.img}" style="width:55%;height:auto;max-height:60%;object-fit:contain;image-rendering:pixelated;" draggable="false"/>
        <span style="font-size:85%;font-weight:bold;margin-top:2px;">${prize.label}</span>
        <span style="font-size:72%;color:#aaa;">${payout.toLocaleString()}g</span>
      `;
      cell.appendChild(prizeDiv);

      // Scratch canvas
      const canvas = document.createElement('canvas');
      canvas.id = `ccanvas-${i}`;
      cell.appendChild(canvas);

      layer.appendChild(cell);

      initCanvas(canvas, def, r, i);
    });
  }

  // Preload the cover image once
  const coverImg = new Image();
  coverImg.src = 'scratch-cover.png';

  function initCanvas(canvas, def, r, i) {
    const w = Math.round(def.w * r.width);
    const h = Math.round(def.h * r.height);
    canvas.width  = w;
    canvas.height = h;
    canvas.style.width  = '100%';
    canvas.style.height = '100%';

    const ctx = canvas.getContext('2d');

    function drawCover() {
      ctx.clearRect(0, 0, w, h);
      ctx.drawImage(coverImg, 0, 0, w, h);
    }

    if (coverImg.complete) {
      drawCover();
    } else {
      coverImg.onload = drawCover;
    }

    canvas.addEventListener('mousedown', (e) => { if (!ticketActive || cellRevealed[i]) return; isScratching = true; activeCellIdx = i; scratch(e, canvas, i); });
    canvas.addEventListener('mousemove', (e) => { if (!isScratching || activeCellIdx !== i || !ticketActive || cellRevealed[i]) return; scratch(e, canvas, i); });
    canvas.addEventListener('mouseup',   () => { isScratching = false; activeCellIdx = -1; });
    canvas.addEventListener('mouseleave',() => { isScratching = false; activeCellIdx = -1; });
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); if (!ticketActive || cellRevealed[i]) return; isScratching = true; activeCellIdx = i; scratch(e.touches[0], canvas, i); }, { passive: false });
    canvas.addEventListener('touchmove',  (e) => { e.preventDefault(); if (!isScratching || activeCellIdx !== i || !ticketActive || cellRevealed[i]) return; scratch(e.touches[0], canvas, i); }, { passive: false });
    canvas.addEventListener('touchend',   () => { isScratching = false; activeCellIdx = -1; });
  }

  function scratch(e, canvas, i) {
    const rect = canvas.getBoundingClientRect();
    const sx = (e.clientX - rect.left) * (canvas.width  / rect.width);
    const sy = (e.clientY - rect.top)  * (canvas.height / rect.height);
    const ctx = canvas.getContext('2d');
    const r = Math.max(canvas.width, canvas.height) * 0.22;
    ctx.globalCompositeOperation = 'destination-out';
    ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI * 2); ctx.fill();
    ctx.globalCompositeOperation = 'source-over';
    checkCoverage(canvas, i);
  }

  function checkCoverage(canvas, i) {
    if (cellRevealed[i]) return;
    const data = canvas.getContext('2d').getImageData(0, 0, canvas.width, canvas.height).data;
    let transparent = 0;
    for (let j = 3; j < data.length; j += 4) if (data[j] < 128) transparent++;
    if (transparent / (canvas.width * canvas.height) >= SCRATCH_THRESHOLD) revealCell(i);
  }

  function revealCell(i) {
    if (cellRevealed[i]) return;
    cellRevealed[i] = true;
    const cell = document.getElementById(`scell-${i}`);
    if (cell) { const c = cell.querySelector('canvas'); if (c) c.style.display = 'none'; }
    if (cellRevealed.every(r => r)) finishTicket();
  }

  function revealAll() {
    if (!ticketActive) return;
    for (let i = 0; i < CELLS; i++) revealCell(i);
  }

  function finishTicket() {
    ticketActive = false;
    document.getElementById('revealAllBtn').disabled = true;

    const winPcts = findWins(ticketValues);
    const totalWin = calcPayout(winPcts);

    // Always a winner - highlight matching cells
    for (let i = 0; i < CELLS; i++) {
      if (winPcts.includes(ticketValues[i].pct)) {
        const prizeDiv = document.getElementById(`cprize-${i}`);
        if (prizeDiv) prizeDiv.classList.add('winner-glow');
      }
    }

    balance += totalWin;
    updateHUD();
    document.getElementById('lastWinDisplay').textContent = fmt(totalWin);
    document.getElementById('lastWinDisplay').className = 'hud-value green';

    const banner = document.getElementById('resultBanner');
    banner.className = 'result-banner win';
    const winPrize = ticketValues.find(v => winPcts.includes(v.pct));
    if (winPrize && winPrize.pct >= 2000)    { banner.textContent = `🎰 JACKPOT! +${fmt(totalWin)}!`;   spawnParticles('💰', 20); }
    else if (winPrize && winPrize.pct >= 200){ banner.textContent = `🏆 BIG WIN! +${fmt(totalWin)}`;    spawnParticles('⭐', 12); }
    else if (winPrize && winPrize.pct >= 100){ banner.textContent = `✨ WINNER! +${fmt(totalWin)}`;      spawnParticles('✨', 8); }
    else                                      { banner.textContent = `You win ${fmt(totalWin)}! Match: ${winPrize ? winPrize.label : ''}`;  }
    document.getElementById('buyBtn').disabled = balance < TICKET_COST;
  }

  function buyTicket() {
    if (balance < TICKET_COST) return;
    buyin = TICKET_COST;
    balance -= TICKET_COST;
    updateHUD();
    ticketValues = generateTicket();
    cellRevealed = new Array(CELLS).fill(false);
    ticketActive = true;
    document.getElementById('resultBanner').className = 'result-banner idle';
    document.getElementById('resultBanner').textContent = 'SCRATCH YOUR TICKET';
    document.getElementById('revealAllBtn').disabled = false;
    document.getElementById('buyBtn').disabled = false;
    if (!debugMode) rebuildScratchCells();
  }

  function spawnParticles(emoji, count) {
    const wrap = document.getElementById('ticket-wrap');
    const r = wrap.getBoundingClientRect();
    for (let i = 0; i < count; i++) {
      setTimeout(() => {
        const p = document.createElement('div');
        p.className = 'particle';
        p.textContent = emoji;
        p.style.left = (r.left + Math.random() * r.width) + 'px';
        p.style.top  = (r.top  + Math.random() * r.height * 0.6 + r.height * 0.2) + 'px';
        p.style.animationDelay = (Math.random() * 0.4) + 's';
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 2000);
      }, i * 60);
    }
  }

  // Reposition cells on resize
  window.addEventListener('resize', () => {
    if (debugMode) buildDebugBoxes();
    else rebuildScratchCells();
  });

  // Init
  updateHUD();
  buyTicket();
</script>
</body>
</html>
